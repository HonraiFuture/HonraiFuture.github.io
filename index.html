<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Honrai</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --border: #e5e5e5;
    --text: #1a1a1a;
    --muted: #8a8a8a;
    --navy: #152238;
    --lemon: #f0d030;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    padding: 24px 16px 80px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; }

  /* HEADER / BRANDING */
  .brandbar { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .logo {
    width: 34px; height: 34px; border-radius: 50%;
    background: #000000;
    border: 2px solid var(--navy);
    flex-shrink: 0;
    position: relative;
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
  .brand-title { font-size: 22px; font-weight: 700; color: var(--navy); letter-spacing: 0.5px; }
  .brand-sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .live-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--lemon);
    margin-left: auto;
    box-shadow: 0 0 0 0 rgba(240, 208, 48, 0.6);
    animation: pulse 2s infinite;
    align-self: center;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(240, 208, 48, 0.55); }
    70% { box-shadow: 0 0 0 8px rgba(240, 208, 48, 0); }
    100% { box-shadow: 0 0 0 0 rgba(240, 208, 48, 0); }
  }

  /* INPUTS */
  input, textarea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-family: var(--sans);
    transition: border-color 0.2s ease;
  }
  input:focus, textarea:focus { outline: none; border-color: var(--navy); }
  input::placeholder, textarea::placeholder { color: var(--muted); }

  /* BUTTONS */
  button {
    background: var(--navy);
    color: #ffffff;
    border: none;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--sans);
    transition: filter 0.2s ease, background 0.2s ease, opacity 0.2s ease;
  }
  button:hover { filter: brightness(1.15); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button.secondary:hover { filter: none; border-color: var(--muted); background: #f2f2f2; }
  button.tiny { padding: 4px 10px; font-size: 11px; }

  .row { display: flex; gap: 8px; margin-bottom: 8px; }

  /* STATUS / MESSAGE BOXES */
  .status { font-size: 11px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; text-transform: uppercase; color: var(--muted); font-family: var(--mono); }
  #errorBox, #errorBox2 { background: #fff; border: 1px solid #d13b2a; color: #b3392a; padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 16px; display: none; white-space: pre-wrap; font-family: var(--mono); }
  #debugBox { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 10px 14px; border-radius: 8px; font-size: 11px; margin-bottom: 16px; display: none; white-space: pre-wrap; font-family: var(--mono); }
  #noticeBox { background: var(--card); border: 1px solid var(--navy); border-left: 3px solid var(--navy); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 16px; display: none; white-space: pre-wrap; }

  section { margin-bottom: 28px; }
  section h2 { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 0 0 12px; font-weight: 600; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .card.flat { border: 1px solid var(--border); background: #fdfdfd; }
  .card.pending { border-left: 3px solid var(--navy); }

  .muted { color: var(--muted); font-size: 12px; }
  .mono { font-family: var(--mono); }
  a { color: var(--navy); }

  .secretbar { display:flex; justify-content:flex-end; margin-bottom: 12px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
  .tab {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    padding: 10px 14px;
    cursor: pointer;
    border-radius: 0;
    transition: color 0.2s ease, border-color 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { filter: none; color: var(--text); background: transparent; }
  .tab.active { color: var(--navy); border-bottom-color: var(--navy); }

  /* BADGES / COUNTERS */
  .badge {
    background: var(--lemon);
    color: var(--navy);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 20px;
    line-height: 1.6;
    display: inline-block;
  }

  /* SUMMARY (Beranda) */
  .summary-grid { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .summary-card {
    flex: 1; min-width: 120px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 14px;
  }
  .summary-num { font-family: var(--mono); font-size: 28px; font-weight: 700; color: var(--navy); line-height: 1; }
  .summary-num.attn { color: var(--text); }
  .summary-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }

  /* TAB PANELS + FADE */
  .panel { display: none; animation: fadeIn 0.3s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* LOGIN */
  #loginView { max-width: 420px; margin: 0 auto; }
  #loginView .login-head { text-align: center; margin-bottom: 26px; }
  #loginView .brandbar { justify-content: center; }
  #loginView .live-dot { display: none; }
</style>
</head>
<body>
<div class="wrap">

  <!-- LOGIN VIEW -->
  <div id="loginView">
    <div class="login-head">
      <div class="brandbar">
        <div class="logo"></div>
        <div class="brand-text">
          <span class="brand-title">Honrai</span>
          <span class="brand-sub">Operating System</span>
        </div>
      </div>
    </div>
    <p class="muted">Masukkan APP_SECRET buat sesi ini. Bisa disimpan di browser ini biar nggak ketik ulang.</p>
    <div class="row">
      <input type="password" id="secretInput" placeholder="APP_SECRET" />
      <button onclick="connect()">Hubungkan</button>
    </div>
    <label class="muted" style="display:block; margin-bottom:12px;">
      <input type="checkbox" id="rememberSecret" checked style="width:auto; margin-right:6px;" />
      Ingat secret di browser ini
    </label>
    <div id="errorBox"></div>
    <div id="debugBox"></div>
  </div>

  <!-- MAIN VIEW -->
  <div id="mainView" style="display:none;">

    <div class="brandbar">
      <div class="logo"></div>
      <div class="brand-text">
        <span class="brand-title">Honrai</span>
        <span class="brand-sub">Operating System</span>
      </div>
      <div class="live-dot" title="Sistem terkoneksi"></div>
    </div>

    <div class="secretbar">
      <button class="secondary tiny" onclick="changeSecret()">Ganti Secret</button>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" id="tabBtnBeranda" onclick="switchTab('beranda')">Beranda</button>
      <button class="tab" id="tabBtnEntries" onclick="switchTab('entries')">Entries</button>
      <button class="tab" id="tabBtnPending" onclick="switchTab('pending')">
        Menunggu Keputusan <span id="pendingBadge" class="badge" style="display:none;">0</span>
      </button>
    </div>

    <div id="noticeBox"></div>
    <div id="errorBox2"></div>

    <!-- PANEL: BERANDA -->
    <div class="panel active" id="panelBeranda">
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-num" id="sumTotal">0</div>
          <div class="summary-label">Total Entries</div>
        </div>
        <div class="summary-card">
          <div class="summary-num attn" id="sumUnclassified">0</div>
          <div class="summary-label">Belum Diklasifikasi</div>
        </div>
        <div class="summary-card">
          <div class="summary-num attn" id="sumPending">0</div>
          <div class="summary-label">PR Menunggu</div>
        </div>
      </div>

      <section>
        <h2>Catatan baru</h2>
        <div class="row">
          <input id="composeInput" placeholder="Tulis sesuatu..." />
          <button onclick="submitEntry()">Kirim</button>
          <button class="secondary" onclick="submitInstruction()">Jadikan Instruksi AI</button>
        </div>
      </section>

      <button class="secondary" onclick="refresh()">&#8635; Refresh</button>
    </div>

    <!-- PANEL: ENTRIES -->
    <div class="panel" id="panelEntries">
      <section>
        <h2>Log entries</h2>
        <div id="entriesList"><p class="muted">Memuat...</p></div>
      </section>
      <button class="secondary" onclick="refresh()">&#8635; Refresh</button>
    </div>

    <!-- PANEL: PENDING -->
    <div class="panel" id="panelPending">
      <section>
        <h2>Menunggu keputusan</h2>
        <div id="pendingList"><p class="muted">Memuat...</p></div>
      </section>
      <button class="secondary" onclick="refresh()">&#8635; Refresh</button>
    </div>

  </div>
</div>

<script>
const BASE_URL = "https://ppomgoflwpsyatmaynne.supabase.co/functions/v1";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwb21nb2Zsd3BzeWF0bWF5bm5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NzIxMzksImV4cCI6MjEwMDA0ODEzOX0.H2fO03O2-_QrjFbVaTcEN2KWHJ79I_sMbmKjdZ1Itsg";
const SECRET_KEY = "aios_app_secret";
let SECRET = "";

function switchTab(name) {
  const map = {
    beranda: ["tabBtnBeranda", "panelBeranda"],
    entries: ["tabBtnEntries", "panelEntries"],
    pending: ["tabBtnPending", "panelPending"],
  };
  Object.values(map).forEach(([btn, panel]) => {
    document.getElementById(btn).classList.remove("active");
    document.getElementById(panel).classList.remove("active");
  });
  const [btn, panel] = map[name];
  document.getElementById(btn).classList.add("active");
  document.getElementById(panel).classList.add("active");
}

function showError(msg) {
  const box = document.getElementById("errorBox");
  const box2 = document.getElementById("errorBox2");
  [box, box2].forEach(b => { if (b) { b.style.display = "block"; b.textContent = msg; } });
}
function clearError() {
  const box = document.getElementById("errorBox");
  const box2 = document.getElementById("errorBox2");
  [box, box2].forEach(b => { if (b) { b.style.display = "none"; b.textContent = ""; } });
}
function debug(msg) {
  const box = document.getElementById("debugBox");
  box.style.display = "block";
  box.textContent = msg;
}
function showNotice(msg) {
  const box = document.getElementById("noticeBox");
  if (!box) return;
  box.style.display = "block";
  box.textContent = msg;
}
function clearNotice() {
  const box = document.getElementById("noticeBox");
  if (!box) return;
  box.style.display = "none";
  box.textContent = "";
}

async function call(fn, payload) {
  const res = await fetch(`${BASE_URL}/${fn}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${ANON_KEY}`,
      "x-app-secret": SECRET,
    },
    body: JSON.stringify(payload || {}),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || (fn + " gagal (" + res.status + ")"));
  return data;
}

async function connect() {
  SECRET = document.getElementById("secretInput").value;
  clearError();
  debug("Menghubungi " + BASE_URL + "/list-entries ...");
  try {
    await call("list-entries", { limit: 1 });
    const remember = document.getElementById("rememberSecret");
    if (!remember || remember.checked) {
      try { localStorage.setItem(SECRET_KEY, SECRET); } catch (e) {}
    }
    document.getElementById("loginView").style.display = "none";
    document.getElementById("mainView").style.display = "block";
    refresh();
  } catch (err) {
    showError("Gagal connect: " + (err.message || err) + "\\n\\nKalau pesannya 'Failed to fetch', berarti koneksi ke Supabase-nya sendiri yang gagal (jaringan/CORS/domain). Kalau pesannya 'Unauthorized', berarti APP_SECRET salah.");
    debug("Error detail: " + (err.stack || err));
  }
}

function changeSecret() {
  try { localStorage.removeItem(SECRET_KEY); } catch (e) {}
  SECRET = "";
  clearError();
  clearNotice();
  document.getElementById("mainView").style.display = "none";
  document.getElementById("loginView").style.display = "block";
  const inp = document.getElementById("secretInput");
  if (inp) { inp.value = ""; inp.focus(); }
}

async function refresh() {
  clearError();
  try {
    const e = await call("list-entries", { limit: 20 });
    const p = await call("list-pending-edits", {});
    const entries = e.entries || [];
    const pending = p.pending_edits || [];
    renderEntries(entries);
    renderPending(pending);
    updateSummary(entries, pending);
  } catch (err) {
    showError(String(err.message || err));
  }
}

function updateSummary(entries, pending) {
  const total = entries.length;
  const unclassified = entries.filter(e => e.status === "new").length;
  const pendingCount = pending.length;

  document.getElementById("sumTotal").textContent = total;
  document.getElementById("sumUnclassified").textContent = unclassified;
  document.getElementById("sumPending").textContent = pendingCount;

  const badge = document.getElementById("pendingBadge");
  if (pendingCount > 0) {
    badge.style.display = "inline-block";
    badge.textContent = pendingCount;
  } else {
    badge.style.display = "none";
  }
}

async function submitEntry() {
  const text = document.getElementById("composeInput").value.trim();
  if (!text) return;
  clearNotice();
  try {
    await call("ingest", { type: "text", content: text, metadata: { source: "standalone_console" } });
    document.getElementById("composeInput").value = "";
    refresh();
  } catch (err) {
    showError(String(err.message || err));
  }
}

async function submitInstruction() {
  const text = document.getElementById("composeInput").value.trim();
  if (!text) return;
  clearNotice();
  clearError();
  try {
    const ingested = await call("ingest", { type: "text", content: text, metadata: { source: "standalone_console", is_instruction: true } });
    const entryId = ingested.entry_id || (ingested.entry && ingested.entry.id) || ingested.id;
    if (!entryId) throw new Error("Gagal mendapatkan entry_id dari hasil ingest.");
    await call("interpret-instruction", { entry_id: entryId });
    document.getElementById("composeInput").value = "";
    showNotice("Instruksi diterima. AI sedang menyusun PR (pending edit) untuk perubahan ini \\u2014 cek tab \"Menunggu Keputusan\" sebentar lagi.");
    refresh();
  } catch (err) {
    showError(String(err.message || err));
  }
}

async function classifyEntry(id) {
  try {
    await call("classify", { entry_id: id });
    refresh();
  } catch (err) {
    showError(String(err.message || err));
  }
}

async function decide(id, decision) {
  try {
    let feedback;
    if (decision === "refine") {
      feedback = prompt("Feedback buat revisi:");
      if (!feedback) return;
    }
    await call("review-edit", { pending_edit_id: id, decision, revision_feedback: feedback });
    refresh();
  } catch (err) {
    showError(String(err.message || err));
  }
}

async function triggerRevision(id) {
  try {
    await call("revise-edit", { pending_edit_id: id });
    refresh();
  } catch (err) {
    showError(String(err.message || err));
  }
}

function renderEntries(entries) {
  const el = document.getElementById("entriesList");
  if (entries.length === 0) { el.innerHTML = '<p class="muted">Belum ada entry.</p>'; return; }
  el.innerHTML = entries.map(e => `
    <div class="card flat">
      <div style="display:flex; justify-content:space-between; gap:10px;">
        <div style="flex:1; min-width:0;">
          <div style="font-size:13px;">${escapeHtml(e.content || ("(" + e.type + ")"))}</div>
          <div class="muted mono" style="margin-top:4px;">${new Date(e.created_at).toLocaleString("id-ID")}${e.classifications && e.classifications[0] ? " &middot; " + escapeHtml(e.classifications[0].label) : ""}</div>
        </div>
        <div style="display:flex; align-items:start; gap:6px;">
          ${e.status === "new" ? `<button class="secondary" onclick="classifyEntry('${e.id}')">Klasifikasi</button>` : ""}
          <span class="status">${e.status}</span>
        </div>
      </div>
    </div>
  `).join("");
}

function renderPending(items) {
  const el = document.getElementById("pendingList");
  if (items.length === 0) { el.innerHTML = '<p class="muted">Tidak ada PR menunggu.</p>'; return; }
  el.innerHTML = items.map(pe => `
    <div class="card pending">
      <div style="display:flex; justify-content:space-between; gap:10px; margin-bottom:8px;">
        <div style="font-size:13px;">${escapeHtml(pe.diff_summary)}</div>
        <span class="status">${pe.status}</span>
      </div>
      ${pe.pr_url ? `<div class="muted mono" style="margin-bottom:8px;"><a href="${pe.pr_url}" target="_blank">Lihat diff &#8599;</a></div>` : ""}
      ${pe.status === "needs_revision"
        ? `<button onclick="triggerRevision('${pe.id}')" style="width:100%;">Jalankan revisi AI</button>`
        : `<div class="row">
             <button onclick="decide('${pe.id}','approve')" style="flex:1;">Approve</button>
             <button onclick="decide('${pe.id}','decline')" class="secondary" style="flex:1;">Decline</button>
             <button onclick="decide('${pe.id}','refine')" class="secondary" style="flex:1;">Refine</button>
           </div>`
      }
    </div>
  `).join("");
}

function escapeHtml(s) {
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

// Auto-connect kalau secret sudah tersimpan di browser
(function initSecret() {
  let saved = "";
  try { saved = localStorage.getItem(SECRET_KEY) || ""; } catch (e) {}
  if (saved) {
    SECRET = saved;
    const inp = document.getElementById("secretInput");
    if (inp) inp.value = saved;
    connect();
  }
})();
</script>
</body>
</html>
