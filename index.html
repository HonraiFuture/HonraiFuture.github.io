<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#152238" />
<title>Honrai</title>
<style>
  :root{
    --navy:#152238;
    --lemon:#f0d030;
    --bg:#f4f5f6;
    --card:#ffffff;
    --text:#1a1c1f;
    --muted:#8a8a8a;
    --line:#e5e5e5;
    --line-soft:#f0f0f0;
    --danger:#d13b2a;
    --danger-soft:#fbe9e6;
    --ok:#1f6f4a;
    --pad:16px;
    --nav-h:64px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text)}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:15px;line-height:1.55;
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 12px);
    -webkit-text-size-adjust:100%;
  }
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .muted{color:var(--muted);font-size:12.5px}
  .hidden{display:none !important}

  /* ---------- LOGIN ---------- */
  #loginView{max-width:420px;margin:0 auto;padding:56px 20px}
  #loginView h1{font-size:30px;letter-spacing:-.02em;margin:0 0 6px}
  #loginView h1 span{color:var(--lemon)}

  /* ---------- HEADER ---------- */
  header{
    position:sticky;top:0;z-index:40;background:var(--navy);color:#fff;
    padding:calc(env(safe-area-inset-top,0px) + 12px) var(--pad) 12px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  header .brand{font-size:17px;font-weight:700;letter-spacing:-.01em}
  header .brand span{color:var(--lemon)}
  header .hdr-actions{display:flex;gap:8px;align-items:center}
  .icon-btn{
    background:rgba(255,255,255,.12);border:0;color:#fff;border-radius:8px;
    padding:7px 11px;font-size:13px;cursor:pointer;font-family:inherit;
  }
  .icon-btn:active{background:rgba(255,255,255,.25)}

  .wrap{max-width:640px;margin:0 auto;padding:0 var(--pad)}
  .pull-hint{text-align:center;font-size:11px;color:var(--muted);padding:8px 0 2px;height:26px}

  /* ---------- CARD ---------- */
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px;margin-bottom:10px;
  }
  .card.tight{padding:12px}
  h2{font-size:12px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin:22px 0 10px;font-weight:600}
  h2:first-child{margin-top:14px}

  /* ---------- BRIEF ---------- */
  .brief{background:var(--navy);color:#fff;border:0}
  .brief .headline{font-size:17px;font-weight:600;line-height:1.45;letter-spacing:-.01em}
  .brief .date{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:8px}
  .brief .sec{margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.15)}
  .brief .sec-t{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--lemon);margin-bottom:4px}
  .brief .sec-b{font-size:13.5px;color:rgba(255,255,255,.9)}
  .warn{
    background:rgba(240,208,48,.14);border-left:3px solid var(--lemon);
    padding:9px 11px;border-radius:0 6px 6px 0;margin-top:10px;font-size:13.5px;
  }
  .act-item{font-size:13.5px;color:rgba(255,255,255,.9);padding:3px 0 3px 16px;position:relative}
  .act-item:before{content:"→";position:absolute;left:0;color:var(--lemon)}

  /* ---------- COMPOSER ---------- */
  textarea,input[type=text],input[type=password],input[type=number],input[type=date],select{
    width:100%;font-family:inherit;font-size:15px;padding:12px;
    border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--text);
  }
  textarea{resize:none;overflow:hidden;min-height:52px;line-height:1.5}
  textarea:focus,input:focus,select:focus{outline:2px solid var(--navy);outline-offset:-1px;border-color:var(--navy)}

  button{
    font-family:inherit;font-size:14.5px;font-weight:600;padding:11px 16px;
    border-radius:9px;border:1.5px solid var(--navy);background:var(--navy);color:#fff;cursor:pointer;
  }
  button:active{opacity:.75}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.ghost{background:transparent;color:var(--navy)}
  button.danger{background:var(--danger);border-color:var(--danger)}
  button.danger.ghost{background:transparent;color:var(--danger)}
  button.tiny{font-size:12.5px;padding:7px 11px;border-radius:7px}
  button.full{width:100%}
  .row{display:flex;gap:8px;align-items:flex-start}
  .row>textarea{flex:1}
  .btn-row{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
  .btn-row>button{flex:1;min-width:118px}

  /* ---------- PROPOSAL ---------- */
  .proposal{border:1.5px solid var(--navy);border-radius:12px;padding:14px;margin-top:10px;background:#fff}
  .intent{
    display:inline-block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
    background:var(--navy);color:#fff;padding:3px 9px;border-radius:5px;
  }
  .intent.kode{background:var(--danger)}
  .intent.pertanyaan{background:var(--ok)}
  .step{font-size:13.5px;padding:4px 0 4px 18px;position:relative}
  .step:before{content:"";position:absolute;left:5px;top:12px;width:5px;height:5px;border-radius:50%;background:var(--navy)}
  .risk{background:var(--danger-soft);border-left:3px solid var(--danger);padding:9px 11px;border-radius:0 6px 6px 0;font-size:13px;margin-top:10px}

  /* ---------- CHIPS ---------- */
  .chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:none;font-size:13px;font-weight:600;padding:7px 13px;border-radius:999px;
    border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;
  }
  .chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
  .chip .n{opacity:.65;margin-left:5px;font-size:11.5px}

  /* ---------- INBOX ITEM ---------- */
  .item{background:#fff;border:1px solid var(--line);border-left:3px solid var(--line);border-radius:10px;padding:13px;margin-bottom:9px}
  .item.p1{border-left-color:var(--danger)}
  .item.p2{border-left-color:var(--navy)}
  .item.p3{border-left-color:var(--lemon)}
  .item.p4{border-left-color:var(--line)}
  .item .kind{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .item .title{font-size:14.5px;font-weight:600;margin-top:3px;line-height:1.45;word-break:break-word}
  .item .sub{font-size:12.5px;color:var(--muted);margin-top:4px;word-break:break-word}
  .amount{font-size:19px;font-weight:700;color:var(--navy);margin-top:7px}
  .jrow{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:3px 0;border-bottom:1px solid var(--line-soft)}
  .jrow:last-child{border-bottom:0}

  /* ---------- MEMORY ---------- */
  .fact{background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:9px}
  .fact .c{font-size:14.5px;line-height:1.5}
  .meta{font-size:11.5px;color:var(--muted);margin-top:7px;display:flex;flex-wrap:wrap;gap:9px}
  .src{background:var(--bg);border-radius:7px;padding:9px;margin-top:9px;font-size:12.5px;color:var(--muted)}
  .src>div{padding:4px 0;border-bottom:1px solid var(--line)}
  .src>div:last-child{border-bottom:0}
  .bar{height:3px;background:var(--line-soft);border-radius:2px;overflow:hidden;margin-top:7px}
  .bar>i{display:block;height:100%;background:var(--lemon)}

  /* ---------- NAV ---------- */
  nav{
    position:fixed;left:0;right:0;bottom:0;z-index:50;background:#fff;
    border-top:1px solid var(--line);display:flex;
    padding-bottom:env(safe-area-inset-bottom,0px);
  }
  nav button{
    flex:1;background:none;border:0;color:var(--muted);font-size:11px;font-weight:600;
    padding:9px 2px 10px;border-radius:0;display:flex;flex-direction:column;align-items:center;gap:3px;
  }
  nav button .ic{font-size:19px;line-height:1}
  nav button.on{color:var(--navy)}
  nav button.on .ic{transform:translateY(-1px)}
  .dot{
    position:absolute;transform:translate(14px,-4px);background:var(--danger);color:#fff;
    font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;
    display:flex;align-items:center;justify-content:center;padding:0 4px;
  }

  /* ---------- MISC ---------- */
  .toast{
    position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--nav-h) + 18px);
    background:var(--navy);color:#fff;padding:11px 17px;border-radius:9px;font-size:13.5px;
    z-index:90;max-width:88%;box-shadow:0 6px 22px rgba(0,0,0,.2);
  }
  .toast.err{background:var(--danger)}
  .sk{background:linear-gradient(90deg,#eee 25%,#f6f6f6 50%,#eee 75%);background-size:200% 100%;animation:sh 1.3s infinite;border-radius:7px;height:13px;margin-bottom:8px}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:26px 12px}
  .seg{display:flex;gap:6px;margin-bottom:12px}
  .seg button{flex:1;font-size:12.5px;padding:8px;border-radius:8px;background:#fff;color:var(--muted);border:1px solid var(--line)}
  .seg button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginView">
  <h1>Hon<span>rai</span></h1>
  <p class="muted" style="margin:0 0 22px">Masukkan kunci aplikasi untuk melanjutkan.</p>
  <input type="password" id="secretInput" placeholder="Kunci aplikasi" autocomplete="current-password" />
  <div style="height:10px"></div>
  <button class="full" onclick="connect()">Masuk</button>
  <p id="loginMsg" class="muted" style="margin-top:14px"></p>
</div>

<!-- ================= MAIN ================= -->
<div id="mainView" class="hidden">
  <header>
    <div class="brand">Hon<span>rai</span></div>
    <div class="hdr-actions">
      <button class="icon-btn" onclick="refreshCurrent()">&#8635;</button>
      <button class="icon-btn" onclick="logout()">Keluar</button>
    </div>
  </header>

  <div class="pull-hint" id="pullHint"></div>
  <div class="wrap">

    <!-- ---------- HUB ---------- -->
    <div id="viewHub">
      <div id="briefBox"></div>

      <h2>Tulis sesuatu</h2>
      <div class="card">
        <textarea id="composer" rows="1" placeholder="Catatan, pertanyaan, atau permintaan perubahan aplikasi..." oninput="autoGrow(this)"></textarea>
        <div class="btn-row">
          <button class="full" onclick="planFromComposer()" id="btnPlan">Susun rencana</button>
        </div>
        <p class="muted" style="margin:8px 0 0">Tidak ada yang dijalankan sebelum Anda menyetujui.</p>
        <div id="proposalBox"></div>
      </div>

      <h2>Butuh perhatian</h2>
      <div class="chips" id="inboxChips"></div>
      <div id="inboxList"></div>
    </div>

    <!-- ---------- MEMORI ---------- -->
    <div id="viewMemori" class="hidden">
      <h2>Yang saya ketahui tentang Anda</h2>
      <p class="muted" id="memSummary" style="margin:-4px 0 12px"></p>
      <div id="memFacts"></div>
      <h2>Relasi</h2>
      <div id="memRelations"></div>
      <h2>Episode</h2>
      <div id="memEpisodes"></div>
    </div>

    <!-- ---------- CATATAN ---------- -->
    <div id="viewCatatan" class="hidden">
      <h2>Catatan terakhir</h2>
      <div id="entryList"></div>
    </div>

    <!-- ---------- KEUANGAN ---------- -->
    <div id="viewKeuangan" class="hidden">
      <h2>Posisi kas</h2>
      <div id="finCash"></div>
      <h2>Ringkasan periode</h2>
      <div class="seg" id="finPeriodSeg"></div>
      <div id="finSummary"></div>
      <h2>Saldo akun</h2>
      <div id="finBalances"></div>
      <h2>Persediaan</h2>
      <div id="finInventory"></div>
      <h2>Transaksi</h2>
      <div id="finTx"></div>
    </div>

  </div>
</div>

<nav id="navBar" class="hidden">
  <button id="navHub" class="on" onclick="go('Hub')"><span class="ic">&#9632;</span>Hub<span id="navDot" class="dot hidden">0</span></button>
  <button id="navMemori" onclick="go('Memori')"><span class="ic">&#9679;</span>Memori</button>
  <button id="navCatatan" onclick="go('Catatan')"><span class="ic">&#9634;</span>Catatan</button>
  <button id="navKeuangan" onclick="go('Keuangan')"><span class="ic">&#9650;</span>Keuangan</button>
</nav>

<script>
/* =========================================================
   Honrai — hub satu layar.
   Ditulis ulang 22/7/2026 menggantikan versi yang tumbuh dari tambalan.
   Prinsip:
   - SATU kotak input. Sistem yang menentukan maksud, lalu MENGUSULKAN.
     Tidak ada yang dieksekusi tanpa persetujuan pemilik.
   - SATU pintu untuk semua yang butuh perhatian (get-inbox), disaring chip.
   - Setiap layar memuat ulang sendiri saat dibuka; refresh juga tersedia
     di header (bukan lagi satu tombol di dasar satu panel).
   ========================================================= */

const BASE_URL = "https://ppomgoflwpsyatmaynne.supabase.co/functions/v1";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwb21nb2Zsd3BzeWF0bWF5bm5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NzIxMzksImV4cCI6MjEwMDA0ODEzOX0.H2fO03O2-_QrjFbVaTcEN2KWHJ79I_sMbmKjdZ1Itsg";
const SECRET_KEY = "aios_app_secret";
let SECRET = "";

let currentView = "Hub";
let inboxItems = [];
let inboxFilter = "semua";
let currentProposal = null;
let finData = null;
let finPeriod = "bulan";

/* ---------- util ---------- */
function $(id){ return document.getElementById(id); }
function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function rupiah(n){
  const v = Number(n || 0);
  return "Rp " + Math.round(v).toLocaleString("id-ID");
}
function skel(n){
  let o = "";
  for (let i = 0; i < (n || 3); i++) o += '<div class="card"><div class="sk" style="width:70%"></div><div class="sk" style="width:45%"></div></div>';
  return o;
}
function autoGrow(el){
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 260) + "px";
}
let toastTimer = null;
function toast(msg, isErr){
  const old = document.querySelector(".toast");
  if (old) old.remove();
  const d = document.createElement("div");
  d.className = "toast" + (isErr ? " err" : "");
  d.textContent = msg;
  document.body.appendChild(d);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ d.remove(); }, isErr ? 6000 : 3200);
}
function timeAgo(d){
  if (!d) return "";
  const t = new Date(d).getTime();
  if (isNaN(t)) return "";
  const s = Math.floor((Date.now() - t) / 1000);
  if (s < 60) return "baru saja";
  if (s < 3600) return Math.floor(s / 60) + " menit lalu";
  if (s < 86400) return Math.floor(s / 3600) + " jam lalu";
  if (s < 2592000) return Math.floor(s / 86400) + " hari lalu";
  return new Date(d).toLocaleDateString("id-ID");
}

/* ---------- api ---------- */
async function call(fn, payload){
  const res = await fetch(BASE_URL + "/" + fn, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + ANON_KEY,
      "x-app-secret": SECRET
    },
    body: JSON.stringify(payload || {})
  });
  const data = await res.json().catch(function(){ return {}; });
  if (!res.ok) {
    const e = new Error(data.error || (fn + " gagal (" + res.status + ")"));
    e.status = res.status;
    e.detail = data.detail;
    throw e;
  }
  return data;
}
function fail(err){ toast(String((err && err.message) || err), true); }

/* ---------- auth ---------- */
async function connect(){
  SECRET = $("secretInput").value.trim();
  if (!SECRET) { $("loginMsg").textContent = "Kunci belum diisi."; return; }
  $("loginMsg").textContent = "Menghubungkan...";
  try {
    await call("list-entries", { limit: 1 });
    try { localStorage.setItem(SECRET_KEY, SECRET); } catch (e) {}
    enterApp();
  } catch (err) {
    $("loginMsg").textContent = "Gagal: " + ((err && err.message) || err);
  }
}
function logout(){
  try { localStorage.removeItem(SECRET_KEY); } catch (e) {}
  SECRET = "";
  $("mainView").classList.add("hidden");
  $("navBar").classList.add("hidden");
  $("loginView").classList.remove("hidden");
  $("loginMsg").textContent = "";
}
function enterApp(){
  $("loginView").classList.add("hidden");
  $("mainView").classList.remove("hidden");
  $("navBar").classList.remove("hidden");
  go("Hub");
}

/* ---------- navigasi ---------- */
function go(name){
  currentView = name;
  ["Hub","Memori","Catatan","Keuangan"].forEach(function(v){
    const view = $("view" + v), btn = $("nav" + v);
    if (view) view.classList.toggle("hidden", v !== name);
    if (btn) btn.classList.toggle("on", v === name);
  });
  window.scrollTo(0, 0);
  refreshCurrent();
}
function refreshCurrent(){
  if (currentView === "Hub") loadHub();
  else if (currentView === "Memori") loadMemori();
  else if (currentView === "Catatan") loadCatatan();
  else if (currentView === "Keuangan") loadKeuangan();
}

/* ---------- HUB ---------- */
async function loadHub(){
  loadBrief();
  loadInbox();
}

/* Ringkasan harian: dicache per hari. Saat Hub dibuka hanya "mengintip" cache
   (instan). Bila belum ada, tampilkan tombol -- jangan pernah memblokir layar
   20-30 detik seperti versi sebelumnya. Bisa dilipat; pilihan diingat. */
function briefCollapsed(){
  try { return localStorage.getItem("brief_collapsed") === "1"; } catch(e){ return false; }
}
function toggleBrief(){
  try { localStorage.setItem("brief_collapsed", briefCollapsed() ? "0" : "1"); } catch(e){}
  renderBrief(lastBrief);
}
let lastBrief = null;

function renderBrief(r){
  const el = $("briefBox");
  if (!r) { el.innerHTML = ""; return; }
  const col = briefCollapsed();
  const b = r.brief || {};
  const nWarn = (b.warnings || []).length;

  let h = '<div class="card brief">';
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">';
  h += '<div style="flex:1;min-width:0">';
  h += '<div class="date">' + esc(r.date || "") + (r.cached ? " &middot; tersimpan" : "") + "</div>";
  h += '<div class="headline">' + esc(b.headline || "Tidak ada ringkasan.") + "</div>";
  h += "</div>";
  h += '<button class="icon-btn" style="flex:none" onclick="toggleBrief()">' + (col ? "&#9662;" : "&#9652;") + "</button>";
  h += "</div>";

  if (col) {
    if (nWarn) h += '<div class="muted" style="margin-top:8px;color:var(--lemon)">' + nWarn + " peringatan disembunyikan</div>";
  } else {
    (b.warnings || []).forEach(function(w){ h += '<div class="warn">' + esc(w) + "</div>"; });
    (b.sections || []).forEach(function(s){
      h += '<div class="sec"><div class="sec-t">' + esc(s.title || "") + '</div><div class="sec-b">' + esc(s.body || "") + "</div></div>";
    });
    if ((b.actions || []).length) {
      h += '<div class="sec"><div class="sec-t">Disarankan</div>';
      (b.actions || []).forEach(function(a){ h += '<div class="act-item">' + esc(a) + "</div>"; });
      h += "</div>";
    }
    h += '<div class="btn-row"><button class="icon-btn" onclick="makeBrief(true)">Perbarui ringkasan</button></div>';
  }
  h += "</div>";
  el.innerHTML = h;
}

async function loadBrief(){
  const el = $("briefBox");
  try {
    const r = await call("daily-brief", { peek: true });
    if (r.exists === false) {
      lastBrief = null;
      el.innerHTML = '<div class="card brief"><div class="date">' + esc(r.date || "") + "</div>" +
        '<div class="headline" style="font-size:15px">Ringkasan hari ini belum disusun.</div>' +
        '<div class="btn-row"><button class="icon-btn" onclick="makeBrief(false)">Susun ringkasan</button></div></div>';
      return;
    }
    lastBrief = r;
    renderBrief(r);
  } catch (err) {
    el.innerHTML = '<div class="card"><div class="muted">Ringkasan tidak tersedia: ' + esc((err && err.message) || err) + "</div></div>";
  }
}

async function makeBrief(force){
  const el = $("briefBox");
  el.innerHTML = '<div class="card brief"><div class="sk" style="width:60%;background:#2a3a55"></div>' +
    '<div class="sk" style="width:85%;background:#2a3a55"></div>' +
    '<div class="muted" style="color:rgba(255,255,255,.6)">Menyusun ringkasan, sekitar 20 detik...</div></div>';
  try {
    const r = await call("daily-brief", force ? { force: true } : {});
    lastBrief = r;
    renderBrief(r);
  } catch (err) {
    el.innerHTML = '<div class="card"><div class="muted">Gagal: ' + esc((err && err.message) || err) + "</div></div>";
  }
}

async function loadInbox(){
  $("inboxList").innerHTML = skel(2);
  try {
    const r = await call("get-inbox", { limit: 100 });
    inboxItems = r.items || [];
    renderChips(r.counts_by_kind || {});
    renderInbox();
    const n = r.needs_decision || 0;
    const dot = $("navDot");
    if (n > 0) { dot.textContent = n; dot.classList.remove("hidden"); }
    else dot.classList.add("hidden");
  } catch (err) {
    $("inboxList").innerHTML = '<div class="empty">Gagal memuat: ' + esc((err && err.message) || err) + "</div>";
  }
}

const GROUPS = {
  semua: null,
  uang: ["jurnal","gagal-akunting","akun"],
  keputusan: ["usulan-tindakan","klarifikasi"],
  sistem: ["kode","insiden"]
};
function renderChips(counts){
  const labels = { semua:"Semua", uang:"Uang", keputusan:"Keputusan", sistem:"Sistem" };
  let h = "";
  Object.keys(GROUPS).forEach(function(g){
    let n = 0;
    if (g === "semua") n = inboxItems.length;
    else GROUPS[g].forEach(function(k){ n += (counts[k] || 0); });
    h += '<button class="chip' + (inboxFilter === g ? " on" : "") + '" onclick="setFilter(\'' + g + '\')">' +
         labels[g] + '<span class="n">' + n + "</span></button>";
  });
  $("inboxChips").innerHTML = h;
}
function setFilter(g){
  inboxFilter = g;
  renderChips({});
  const counts = {};
  inboxItems.forEach(function(i){ counts[i.kind] = (counts[i.kind] || 0) + 1; });
  renderChips(counts);
  renderInbox();
}

function renderInbox(){
  const el = $("inboxList");
  const allow = GROUPS[inboxFilter];
  const list = allow ? inboxItems.filter(function(i){ return allow.indexOf(i.kind) >= 0; }) : inboxItems;
  if (!list.length) { el.innerHTML = '<div class="empty">Tidak ada yang menunggu keputusan Anda.</div>'; return; }
  el.innerHTML = list.map(renderInboxItem).join("");
}

function renderInboxItem(i){
  const d = i.data || {};
  let body = "";
  let actions = "";
  const id = esc(i.id);

  if (i.kind === "jurnal") {
    const lines = (d.payload && d.payload.lines) || [];
    body += '<div class="amount">' + rupiah(i.amount) + "</div>";
    if (lines.length) {
      body += '<div style="margin-top:9px">' + lines.map(function(l){
        const isD = Number(l.debit) > 0;
        return '<div class="jrow"><span>' + esc(l.account_name || l.account_code) + '</span><span class="mono">' +
               (isD ? "D " + rupiah(l.debit) : "K " + rupiah(l.credit)) + "</span></div>";
      }).join("") + "</div>";
    }
    actions = '<button class="tiny" onclick="txDecide(\'' + id + '\',\'approve\',' + Number(i.amount || 0) + ')">Setujui &amp; bukukan</button>' +
              '<button class="tiny danger ghost" onclick="txDecide(\'' + id + '\',\'decline\',0)">Tolak</button>';
  }
  else if (i.kind === "usulan-tindakan") {
    const steps = d.steps || [];
    if (d.reasoning) body += '<div class="sub">' + esc(d.reasoning) + "</div>";
    if (steps.length) body += '<div style="margin-top:8px">' + steps.map(function(s){ return '<div class="step">' + esc(s) + "</div>"; }).join("") + "</div>";
    if (d.risk) body += '<div class="risk">' + esc(d.risk) + "</div>";
    actions = '<button class="tiny" onclick="routeDecide(\'' + id + '\',\'approve\')">Jalankan</button>' +
              '<button class="tiny danger ghost" onclick="routeDecide(\'' + id + '\',\'decline\')">Batalkan</button>';
  }
  else if (i.kind === "klarifikasi") {
    body += '<textarea id="clar_' + id + '" rows="1" placeholder="Jawaban Anda..." oninput="autoGrow(this)" style="margin-top:9px"></textarea>';
    actions = '<button class="tiny" onclick="answerClar(\'' + id + '\')">Kirim jawaban</button>';
  }
  else if (i.kind === "akun") {
    actions = '<button class="tiny" onclick="acctDecide(\'' + id + '\',\'approve\')">Setujui</button>' +
              '<button class="tiny danger ghost" onclick="acctDecide(\'' + id + '\',\'decline\')">Tolak</button>';
  }
  else if (i.kind === "kode") {
    if (d.pr_url) body += '<div class="sub mono"><a href="' + esc(d.pr_url) + '" target="_blank" rel="noopener">Lihat perubahan di GitHub</a></div>';
    actions = '<button class="tiny" onclick="editDecide(\'' + id + '\',\'approve\')">Terapkan</button>' +
              '<button class="tiny ghost" onclick="editRevise(\'' + id + '\')">Minta revisi</button>' +
              '<button class="tiny danger ghost" onclick="editDecide(\'' + id + '\',\'decline\')">Tolak</button>';
  }
  else if (i.kind === "gagal-akunting") {
    actions = '<button class="tiny" onclick="retryAccounting(\'' + esc(i.entry_id) + '\')">Coba lagi</button>';
  }

  return '<div class="item p' + (i.priority || 4) + '">' +
    '<div class="kind">' + esc(i.kind_label || i.kind) + " &middot; " + esc(timeAgo(i.created_at)) + "</div>" +
    '<div class="title">' + esc(i.title) + "</div>" +
    (i.subtitle ? '<div class="sub">' + esc(i.subtitle) + "</div>" : "") +
    body +
    (actions ? '<div class="btn-row">' + actions + "</div>" : "") +
  "</div>";
}

/* ---------- composer ---------- */
async function planFromComposer(){
  const el = $("composer");
  const text = el.value.trim();
  if (!text) { toast("Tulis sesuatu dulu.", true); return; }
  const btn = $("btnPlan");
  btn.disabled = true; btn.textContent = "Membaca maksud...";
  $("proposalBox").innerHTML = "";
  try {
    const r = await call("route-entry", { text: text });
    currentProposal = r.proposal;
    renderProposal(r.proposal);
    el.value = "";
    autoGrow(el);
  } catch (err) { fail(err); }
  finally { btn.disabled = false; btn.textContent = "Susun rencana"; }
}

function renderProposal(p){
  if (!p) return;
  const cls = p.intent === "instruksi-kode" ? "kode" : (p.intent === "pertanyaan" ? "pertanyaan" : "");
  let h = '<div class="proposal">';
  h += '<span class="intent ' + cls + '">' + esc(p.intent) + "</span>";
  if (p.confidence != null) h += '<span class="muted mono" style="margin-left:8px">keyakinan ' + esc(String(p.confidence)) + "</span>";
  if (p.reasoning) h += '<div class="sub" style="margin-top:9px">' + esc(p.reasoning) + "</div>";
  if ((p.planned_steps || []).length) {
    h += '<div style="margin-top:9px">' + p.planned_steps.map(function(s){ return '<div class="step">' + esc(s) + "</div>"; }).join("") + "</div>";
  }
  if (p.risk_note) h += '<div class="risk">' + esc(p.risk_note) + "</div>";
  h += '<div class="btn-row">' +
       '<button class="tiny" onclick="execProposal(\'approve\')">Jalankan</button>' +
       '<button class="tiny danger ghost" onclick="execProposal(\'decline\')">Batalkan</button>' +
       "</div></div>";
  $("proposalBox").innerHTML = h;
}

async function execProposal(decision){
  if (!currentProposal) return;
  const box = $("proposalBox");
  box.innerHTML = '<div class="card tight"><div class="sk" style="width:55%"></div></div>';
  try {
    const r = await call("route-execute", { proposal_id: currentProposal.id, decision: decision });
    if (decision === "decline") {
      box.innerHTML = "";
      currentProposal = null;
      toast("Dibatalkan. Tidak ada yang dijalankan.");
      loadInbox();
      return;
    }
    if (r.answer) {
      const m = r.memory_used || {};
      box.innerHTML = '<div class="card tight" style="margin-top:10px">' + esc(r.answer).replace(/\n/g,"<br>") +
        '<div class="meta">' + (m.facts || 0) + " fakta &middot; " + (m.edges || 0) + " relasi &middot; " + (m.episodes || 0) + " episode</div></div>";
    } else {
      box.innerHTML = "";
      $("composer").value = "";
      autoGrow($("composer"));
      const st = r.steps || {};
      toast(st.pr_url ? "Perubahan diajukan sebagai PR." : "Tersimpan." + (st.consolidate_queued ? " Sedang disuling ke memori." : ""));
    }
    currentProposal = null;
    loadInbox();
    loadBrief();
  } catch (err) { fail(err); box.innerHTML = ""; }
}

/* ---------- aksi inbox ---------- */
async function txDecide(id, decision, amount){
  if (decision === "approve" && !confirm("Bukukan " + rupiah(amount) + " ke buku besar?")) return;
  try {
    const r = await call("review-transaction", { pending_id: id, decision: decision });
    toast(r.message || "Selesai."); loadInbox(); loadBrief();
  } catch (err) { fail(err); }
}
async function routeDecide(id, decision){
  try {
    const r = await call("route-execute", { proposal_id: id, decision: decision });
    toast(r.message || (r.answer ? "Dijawab." : "Selesai."));
    if (r.answer) toast(r.answer.slice(0, 120));
    loadInbox();
  } catch (err) { fail(err); }
}
async function answerClar(id){
  const el = $("clar_" + id);
  const answer = el ? el.value.trim() : "";
  if (!answer) { toast("Isi jawaban dulu.", true); return; }
  try {
    await call("answer-clarification", { clarification_id: id, answer: answer });
    toast("Jawaban terkirim."); loadInbox();
  } catch (err) { fail(err); }
}
async function acctDecide(id, decision){
  try {
    await call("review-account-proposal", { proposal_id: id, decision: decision });
    toast(decision === "approve" ? "Akun dibuat." : "Usulan ditolak."); loadInbox();
  } catch (err) { fail(err); }
}
async function editDecide(id, decision){
  let feedback = "";
  if (decision === "decline") feedback = prompt("Alasan menolak (opsional):") || "";
  try {
    await call("review-edit", { pending_edit_id: id, decision: decision, revision_feedback: feedback });
    toast(decision === "approve" ? "Perubahan diterapkan." : "Ditolak."); loadInbox();
  } catch (err) { fail(err); }
}
async function editRevise(id){
  try {
    await call("revise-edit", { pending_edit_id: id });
    toast("Revisi diminta."); loadInbox();
  } catch (err) { fail(err); }
}
async function retryAccounting(entryId){
  try {
    await call("process-accounting-entry", { entry_id: entryId });
    toast("Diproses ulang."); loadInbox();
  } catch (err) { fail(err); }
}

/* ---------- MEMORI ---------- */
async function loadMemori(){
  $("memFacts").innerHTML = skel(3);
  try {
    const r = await call("memory-browse", { limit: 100 });
    const s = r.summary || {};
    $("memSummary").textContent = (s.facts || 0) + " fakta \u00b7 " + (s.entities || 0) + " entitas \u00b7 " +
      (s.relations || 0) + " relasi \u00b7 " + (s.episodes || 0) + " episode";
    renderFacts(r.facts || []);
    $("memRelations").innerHTML = (r.relations || []).length
      ? (r.relations || []).map(function(x){ return '<div class="card tight mono" style="font-size:12.5px">' + esc(x.text) + "</div>"; }).join("")
      : '<div class="empty">Belum ada relasi.</div>';
    $("memEpisodes").innerHTML = (r.episodes || []).length
      ? (r.episodes || []).map(function(e){
          return '<div class="card tight"><div style="font-size:14px">' + esc(e.summary) + "</div>" +
                 '<div class="meta">' + esc(e.occurred_at ? new Date(e.occurred_at).toLocaleDateString("id-ID") : "") + "</div></div>";
        }).join("")
      : '<div class="empty">Belum ada episode.</div>';
  } catch (err) {
    $("memFacts").innerHTML = '<div class="empty">Gagal memuat: ' + esc((err && err.message) || err) + "</div>";
  }
}
function renderFacts(facts){
  if (!facts.length) { $("memFacts").innerHTML = '<div class="empty">Memori masih kosong. Mulai catat sesuatu, nanti saya ingat.</div>'; return; }
  const max = Math.max.apply(null, facts.map(function(f){ return Number(f.salience) || 0; }).concat([1]));
  $("memFacts").innerHTML = facts.map(function(f){
    const id = esc(f.id);
    const pct = Math.round((Number(f.salience) || 0) / max * 100);
    return '<div class="fact" id="fact_' + id + '">' +
      '<div class="c">' + esc(f.content) + "</div>" +
      '<div class="bar"><i style="width:' + pct + '%"></i></div>' +
      '<div class="meta"><span>' + esc(f.category || "-") + "</span><span>salience " + esc(String(f.salience)) +
        "</span><span>diperkuat " + (f.reinforced_count || 1) + "\u00d7</span><span>dipakai " + (f.access_count || 0) + "\u00d7</span></div>" +
      '<div class="btn-row">' +
        '<button class="tiny ghost" onclick="toggleSrc(\'' + id + '\')">Asal (' + ((f.sources || []).length) + ")</button>" +
        '<button class="tiny ghost" onclick="toggleEdit(\'' + id + '\')">Perbaiki</button>' +
        '<button class="tiny danger ghost" onclick="archiveFact(\'' + id + '\')">Arsipkan</button>' +
      "</div>" +
      '<div class="src hidden" id="src_' + id + '">' +
        ((f.sources || []).map(function(s){
          return "<div>" + esc(s.preview || "(tidak ditemukan)") + '<br><span class="mono">' + esc(timeAgo(s.created_at)) + "</span></div>";
        }).join("") || "<div>Tidak ada catatan asal.</div>") +
      "</div>" +
      '<div class="hidden" id="edit_' + id + '" style="margin-top:9px">' +
        '<textarea id="ec_' + id + '" rows="2" oninput="autoGrow(this)">' + esc(f.content) + "</textarea>" +
        '<div style="height:8px"></div>' +
        '<input type="number" id="ei_' + id + '" step="0.05" min="0" max="1" value="' + esc(String(f.importance)) + '" />' +
        '<div class="btn-row"><button class="tiny" onclick="saveFact(\'' + id + '\')">Simpan</button></div>' +
      "</div>" +
    "</div>";
  }).join("");
}
function toggleSrc(id){ const e = $("src_" + id); if (e) e.classList.toggle("hidden"); }
function toggleEdit(id){ const e = $("edit_" + id); if (e) { e.classList.toggle("hidden"); const t = $("ec_" + id); if (t) autoGrow(t); } }
async function saveFact(id){
  const c = $("ec_" + id).value.trim();
  const imp = parseFloat($("ei_" + id).value);
  if (!c) { toast("Isi tidak boleh kosong.", true); return; }
  try {
    const r = await call("memory-edit", { action: "update", memory_id: id, kind: "semantic", content: c, importance: isNaN(imp) ? undefined : imp });
    toast(r.message || "Diperbarui."); loadMemori();
  } catch (err) { fail(err); }
}
async function archiveFact(id){
  if (!confirm("Fakta ini tidak akan dipakai menjawab lagi, tapi masih bisa dipulihkan. Lanjutkan?")) return;
  try {
    const r = await call("memory-edit", { action: "archive", memory_id: id, kind: "semantic" });
    toast(r.message || "Diarsipkan."); loadMemori();
  } catch (err) { fail(err); }
}

/* ---------- CATATAN ---------- */
async function loadCatatan(){
  $("entryList").innerHTML = skel(3);
  try {
    const r = await call("list-entries", { limit: 30 });
    const list = r.entries || [];
    if (!list.length) { $("entryList").innerHTML = '<div class="empty">Belum ada catatan.</div>'; return; }
    $("entryList").innerHTML = list.map(function(e){
      const cls = (e.classifications && e.classifications[0]) || null;
      const label = cls ? (cls.category + "/" + (cls.subcategory || "")) : null;
      return '<div class="card tight">' +
        '<div style="font-size:14px;line-height:1.5">' + esc((e.content || "").slice(0, 260)) + "</div>" +
        '<div class="meta"><span>' + esc(timeAgo(e.created_at)) + "</span>" +
        (label ? "<span>" + esc(label) + "</span>" : "") +
        "<span>" + esc(e.status || "") + "</span></div>" +
        (label ? "" : '<div class="btn-row"><button class="tiny ghost" onclick="classifyOne(\'' + esc(e.id) + '\')">Klasifikasi</button></div>') +
      "</div>";
    }).join("");
  } catch (err) {
    $("entryList").innerHTML = '<div class="empty">Gagal memuat: ' + esc((err && err.message) || err) + "</div>";
  }
}
async function classifyOne(id){
  try { await call("classify", { entry_id: id }); toast("Diklasifikasi."); loadCatatan(); }
  catch (err) { fail(err); }
}

/* ---------- KEUANGAN ---------- */
async function loadKeuangan(){
  $("finCash").innerHTML = skel(1);
  $("finTx").innerHTML = skel(2);
  try {
    finData = await call("get-financial-report", {});
    renderKeuangan();
  } catch (err) {
    $("finCash").innerHTML = '<div class="empty">Gagal memuat: ' + esc((err && err.message) || err) + "</div>";
  }
}
function setPeriod(p){ finPeriod = p; renderKeuangan(); }
function renderKeuangan(){
  const r = finData || {};
  const cp = r.cash_position || {};
  const kas = cp.kas != null ? cp.kas : (cp.cash != null ? cp.cash : 0);
  const bank = cp.bank != null ? cp.bank : 0;
  const total = cp.total != null ? cp.total : (Number(kas) + Number(bank));
  $("finCash").innerHTML = '<div class="card"><div style="display:flex;gap:10px;text-align:center">' +
    '<div style="flex:1"><div style="font-size:17px;font-weight:700">' + rupiah(kas) + '</div><div class="muted">Kas</div></div>' +
    '<div style="flex:1"><div style="font-size:17px;font-weight:700">' + rupiah(bank) + '</div><div class="muted">Bank</div></div>' +
    '<div style="flex:1"><div style="font-size:17px;font-weight:700;color:var(--navy)">' + rupiah(total) + '</div><div class="muted">Total</div></div>' +
    "</div></div>";

  const opts = [["minggu","7 hari"],["bulan","30 hari"],["semua","Semua"]];
  $("finPeriodSeg").innerHTML = opts.map(function(o){
    return '<button class="' + (finPeriod === o[0] ? "on" : "") + '" onclick="setPeriod(\'' + o[0] + '\')">' + o[1] + "</button>";
  }).join("");

  const txAll = r.recent_transactions || [];
  const days = finPeriod === "minggu" ? 7 : (finPeriod === "bulan" ? 30 : 100000);
  const cutoff = Date.now() - days * 86400000;
  const tx = txAll.filter(function(t){
    const d = new Date(t.transaction_date || t.date).getTime();
    return isNaN(d) ? true : d >= cutoff;
  });

  let masuk = 0, keluar = 0;
  tx.forEach(function(t){
    (t.lines || []).forEach(function(l){
      const name = (l.account_name || "").toLowerCase();
      if (name.indexOf("kas") >= 0 || name.indexOf("bank") >= 0) {
        masuk += Number(l.debit || 0);
        keluar += Number(l.credit || 0);
      }
    });
  });
  $("finSummary").innerHTML = '<div class="card"><div style="display:flex;gap:10px;text-align:center">' +
    '<div style="flex:1"><div style="font-size:16px;font-weight:700;color:var(--ok)">' + rupiah(masuk) + '</div><div class="muted">Uang masuk</div></div>' +
    '<div style="flex:1"><div style="font-size:16px;font-weight:700;color:var(--danger)">' + rupiah(keluar) + '</div><div class="muted">Uang keluar</div></div>' +
    '<div style="flex:1"><div style="font-size:16px;font-weight:700">' + rupiah(masuk - keluar) + '</div><div class="muted">Selisih</div></div>' +
    '</div><div class="muted" style="margin-top:8px">' + tx.length + " transaksi pada periode ini.</div></div>";

  $("finBalances").innerHTML = (r.account_balances || []).map(function(b){
    const sus = String(b.code) === "9999";
    return '<div class="card tight" style="display:flex;justify-content:space-between;gap:10px">' +
      '<div><div style="font-size:13.5px;font-weight:600">' + esc(b.name) + (sus ? ' <span style="color:var(--lemon)">&#9679;</span>' : "") + "</div>" +
      '<div class="muted mono">' + esc(b.code) + "</div></div>" +
      '<div class="mono" style="font-weight:600">' + rupiah(b.balance) + "</div></div>";
  }).join("") || '<div class="empty">Belum ada saldo.</div>';

  $("finInventory").innerHTML = (r.inventory_stock || []).map(function(i){
    return '<div class="card tight" style="display:flex;justify-content:space-between;gap:10px">' +
      "<div>" + esc(i.name || i.item_name) + "</div>" +
      '<div class="mono">' + esc(String(i.quantity != null ? i.quantity : (i.stock || 0))) + " " + esc(i.unit || "") + "</div></div>";
  }).join("") || '<div class="empty">Belum ada persediaan.</div>';

  $("finTx").innerHTML = tx.length ? tx.map(function(t){
    const lines = (t.lines || []).map(function(l){
      const isD = Number(l.debit) > 0;
      return '<div class="jrow"><span>' + esc(l.account_name || "") + '</span><span class="mono">' +
             (isD ? "D " + rupiah(l.debit) : "K " + rupiah(l.credit)) + "</span></div>";
    }).join("");
    return '<div class="card tight"><div style="font-size:13.5px;font-weight:600">' + esc(t.description) + "</div>" +
      '<div class="muted mono" style="margin-top:3px">' + esc(timeAgo(t.transaction_date || t.date)) + "</div>" +
      (lines ? '<div style="margin-top:8px">' + lines + "</div>" : "") + "</div>";
  }).join("") : '<div class="empty">Tidak ada transaksi pada periode ini.</div>';
}

/* ---------- tarik untuk memuat ulang ---------- */
let touchStartY = 0, pulling = false;
document.addEventListener("touchstart", function(e){
  if (window.scrollY <= 0) { touchStartY = e.touches[0].clientY; pulling = true; }
}, { passive: true });
document.addEventListener("touchmove", function(e){
  if (!pulling) return;
  const dy = e.touches[0].clientY - touchStartY;
  const hint = $("pullHint");
  if (!hint) return;
  if (dy > 12 && window.scrollY <= 0) hint.textContent = dy > 70 ? "Lepas untuk memuat ulang" : "Tarik untuk memuat ulang";
  else hint.textContent = "";
}, { passive: true });
document.addEventListener("touchend", function(e){
  if (!pulling) return;
  pulling = false;
  const hint = $("pullHint");
  const dy = (e.changedTouches[0].clientY - touchStartY);
  if (hint) hint.textContent = "";
  if (dy > 70 && window.scrollY <= 0) { toast("Memuat ulang..."); refreshCurrent(); }
}, { passive: true });

(function init(){
  let saved = "";
  try { saved = localStorage.getItem(SECRET_KEY) || ""; } catch (e) {}
  if (!saved) return;
  SECRET = saved;
  const inp = $("secretInput");
  if (inp) inp.value = saved;
  call("list-entries", { limit: 1 })
    .then(function(){ enterApp(); })
    .catch(function(){ $("loginMsg").textContent = "Kunci tersimpan tidak berlaku. Masukkan ulang."; });
})();
