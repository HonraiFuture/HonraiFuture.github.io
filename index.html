<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Sistem Entropi</title>
<style>
  :root {
    --bg: #0B0F14; --surface: #131922; --surface2: #1A2129;
    --brass: #C9A227; --brass-dim: #8A7020; --muted: #8B95A1;
    --faint: #4A5560; --border: #232B36; --moss: #5A8A6E; --text: #E6E9ED;
    --rust: #C97757;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Inter", ui-sans-serif, system-ui, sans-serif; }
  #app { max-width: 640px; margin: 0 auto; padding: 24px 20px 90px; min-height: 100vh; }
  button, input, textarea { font-family: inherit; }
  button { cursor: pointer; }
  .eyebrow { font-size: 11px; letter-spacing: 3px; color: var(--brass-dim); text-transform: uppercase; font-weight: 600; }
  .title { font-size: 22px; font-weight: 700; margin-top: 4px; letter-spacing: -0.3px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  .row { display: flex; align-items: center; }
  .between { justify-content: space-between; }
  .primary-btn { background: var(--brass); color: #1A1400; border: none; border-radius: 10px; padding: 11px 16px;
    font-weight: 700; font-size: 13px; width: 100%; }
  .primary-btn:disabled { opacity: 0.5; }
  .ghost-btn { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px;
    color: var(--muted); font-size: 13px; }
  .text-input, .date-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; color: var(--text); font-size: 14px; }
  textarea.text-input { resize: vertical; }
  .error-text { color: var(--rust); font-size: 12px; margin-top: 8px; }
  .tabbar { display: flex; gap: 6px; margin-bottom: 20px; }
  .tabbtn { flex: 1; padding: 11px 4px; border-radius: 10px; border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-size: 12.5px; font-weight: 600; text-align: center; }
  .tabbtn.active { border-color: var(--brass-dim); background: var(--surface2); color: var(--text); }
  .stat-label { font-size: 10px; letter-spacing: 1.5px; color: var(--faint); text-transform: uppercase; }
  .stat-value { font-size: 16px; font-weight: 600; margin-top: 2px; }
  .stat-sub { font-size: 12px; color: var(--brass-dim); font-weight: 500; margin-left: 8px; }
  .phase-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .phase-tab { flex: 1; padding: 10px 6px; border-radius: 10px; border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-size: 11px; text-align: center; position: relative; }
  .phase-tab.active { border-color: var(--brass-dim); background: var(--surface2); color: var(--text); }
  .tab-dot { position: absolute; top: 6px; right: 6px; width: 5px; height: 5px; border-radius: 99px; background: var(--brass); }
  .task { display: flex; align-items: flex-start; gap: 10px; background: transparent; border: none; padding: 0;
    text-align: left; width: 100%; margin-bottom: 10px; }
  .task:last-child { margin-bottom: 0; }
  .checkbox { margin-top: 2px; width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
    border: 1.5px solid var(--faint); display: flex; align-items: center; justify-content: center; }
  .checkbox.done { border-color: var(--moss); background: var(--moss); }
  .task-text { font-size: 13.5px; line-height: 1.5; color: var(--text); }
  .task-text.done { color: var(--faint); text-decoration: line-through; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .section-label { font-size: 11px; letter-spacing: 1.5px; color: var(--faint); text-transform: uppercase; margin-bottom: 12px; }
  .week { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
  .week-head { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 12px;
    background: var(--surface2); border: none; color: var(--text); font-size: 13px; font-weight: 600; }
  .week-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .field-label { font-size: 11px; font-weight: 600; }
  .capture-item { border-bottom: 1px solid var(--border); padding: 12px 0; position: relative; }
  .capture-item:last-child { border-bottom: none; }
  .capture-meta { font-size: 10.5px; color: var(--faint); margin-bottom: 5px; display: flex; gap: 6px; align-items: center; }
  .kind-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
  .kind-text { background: rgba(90,138,110,0.15); color: var(--moss); }
  .kind-voice { background: rgba(201,162,39,0.15); color: var(--brass); }
  .kind-image { background: rgba(90,150,201,0.15); color: #6BA3D6; }
  .capture-content { font-size: 13.5px; line-height: 1.5; white-space: pre-wrap; }
  .capture-img-link { font-size: 12px; color: var(--brass); margin-top: 6px; background: none; border: none; padding: 0; }
  .capture-img { max-width: 100%; border-radius: 8px; margin-top: 8px; display: block; }
  .del-btn { background: none; border: none; color: var(--faint); font-size: 11px; padding: 2px 4px; margin-left: auto; }
  .day-header { font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: 1px; margin: 18px 0 8px; }
  .day-header:first-child { margin-top: 0; }
  .compose { display: flex; flex-direction: column; gap: 10px; }
  .file-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--muted); max-width: 60%; overflow: hidden; }
  .file-btn span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .loading-dot { color: var(--faint); font-size: 12px; text-align: center; padding: 24px 0; }
  .brief-card { border-left: 2px solid var(--brass-dim); padding-left: 14px; margin-bottom: 20px; }
  .brief-date { font-size: 10.5px; color: var(--faint); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .brief-body { font-size: 13.5px; line-height: 1.65; white-space: pre-wrap; }
  .brief-model { font-size: 9.5px; color: var(--faint); margin-top: 8px; font-family: ui-monospace, monospace; }
  .empty-note { color: var(--muted); font-size: 13px; text-align: center; line-height: 1.6; }
  .focus-banner { border: 1px solid var(--brass-dim); background: rgba(201,162,39,0.08); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 16px; }
  .focus-label { font-size: 10px; letter-spacing: 1.5px; color: var(--brass); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
  .focus-text { font-size: 14px; line-height: 1.5; }
  .ai-note { border-bottom: 1px solid var(--border); padding: 10px 0; font-size: 13px; line-height: 1.55; }
  .ai-note:last-child { border-bottom: none; }
  .ai-note-date { font-size: 10px; color: var(--faint); margin-bottom: 3px; }
  .pending-card { border: 1px solid var(--rust); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .pending-type { font-size: 10px; letter-spacing: 1px; color: var(--rust); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
  .pending-body { font-size: 13.5px; line-height: 1.55; margin-bottom: 12px; }
  .pending-actions-row { display: flex; gap: 8px; }
  .approve-btn { flex: 1; background: var(--moss); color: #0B0F14; border: none; border-radius: 8px; padding: 9px; font-weight: 700; font-size: 12.5px; }
  .reject-btn { flex: 1; background: transparent; border: 1px solid var(--rust); color: var(--rust); border-radius: 8px; padding: 9px; font-weight: 700; font-size: 12.5px; }
  svg { display: block; }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";

var API_URL = "https://fafkgfddyrimfdlpqwqs.supabase.co/functions/v1/entropi-api";
var SECRET_KEY = "entropi-webapp-secret";

var PHASES = [
  { range: "Hari 1\u201330", name: "Kunci Modal, Bangun Fondasi",
    goal: "Stop bleeding. Bangun sistem AI-orchestration untuk dirimu sendiri dulu.",
    tasks: [
      "Pisahkan Rp16,3jt: dana hidup darurat (jangan disentuh) vs dana eksperimen (maks 15\u201320%)",
      "Tidak ada trading / eksperimen finansial berisiko selama 30 hari ini",
      "Bangun workflow Supabase + Claude pertama \u2014 satu use-case nyata dari hidup sendiri",
      "Formalisasi kriteria filter entropi jadi satu dokumen/prompt tetap",
      "Sistem kecil jalan tiap hari \u2014 bukan rencana di kertas"
    ]},
  { range: "Hari 31\u201360", name: "Uji ke Dunia Nyata, Diam-diam",
    goal: "Dapat data nyata dari orang lain, tanpa buka identitas publik.",
    tasks: [
      "Persempit satu masalah nyata (live diagnostic) jadi versi paling kecil yang bisa dites 2\u20134 minggu",
      "Tawarkan ke lingkaran terbatas \u2014 teman, bekas klien \u2014 bukan publik luas",
      "Kumpulkan feedback sebagai data & pola, bukan validasi ego",
      "Legalitas/NPWP belum diurus \u2014 skala belum membutuhkan itu"
    ]},
  { range: "Hari 61\u201390", name: "Titik Keputusan",
    goal: "Selesaikan alat-pribadi vs produk-jual \u2014 dengan bukti, bukan niat.",
    tasks: [
      "Review data Fase 2: apakah orang lain benar-benar butuh & mau bayar?",
      "Kalau ya \u2014 desain versi terbatas untuk dijual, tetap privasi-first / desentralisasi",
      "Kalau belum jelas \u2014 perdalam 30 hari lagi sebagai alat pribadi, jangan dipaksa",
      "Evaluasi ulang alokasi modal & kesiapan masuk income experiment kecil"
    ]}
];
var WEEKS = []; for (var w = 1; w <= 13; w++) WEEKS.push(w);

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  attrs = attrs || {};
  for (var k in attrs) {
    if (k === "class") e.className = attrs[k];
    else if (k === "style") e.setAttribute("style", attrs[k]);
    else if (k.indexOf("on") === 0 && typeof attrs[k] === "function") e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  (children || []).forEach(function (c) {
    if (c === null || c === undefined) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}
function svgIcon(pathHtml, color, size) {
  var wrap = document.createElement("div");
  wrap.innerHTML = '<svg width="' + (size||14) + '" height="' + (size||14) + '" viewBox="0 0 24 24" fill="none" stroke="' + color +
    '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + pathHtml + '</svg>';
  return wrap.firstChild;
}
function iconCheck(c) { return svgIcon('<path d="M20 6L9 17l-5-5"/>', c); }
function iconChevron(down, c) { return svgIcon(down ? '<path d="M6 9l6 6 6-6"/>' : '<path d="M9 18l6-6-6-6"/>', c); }
function iconImg(c) { return svgIcon('<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>', c); }

function logoSvg(size) {
  var s = size || 34;
  var wrap = document.createElement("div");
  wrap.innerHTML =
    '<svg width="' + s + '" height="' + s + '" viewBox="0 0 34 34">' +
    '<circle cx="17" cy="17" r="14" fill="none" stroke="#232B36" stroke-width="2.5"/>' +
    '<circle cx="17" cy="17" r="14" fill="none" stroke="#C9A227" stroke-width="2.5" stroke-linecap="round" ' +
    'stroke-dasharray="52 88" transform="rotate(-90 17 17)"/>' +
    '<circle cx="17" cy="17" r="4.5" fill="#C9A227"/>' +
    '</svg>';
  return wrap.firstChild;
}

function todayISO() { return new Date().toISOString().slice(0, 10); }
function dayNumber(startDate) {
  if (!startDate) return null;
  var start = new Date(startDate + "T00:00:00");
  return Math.max(1, Math.floor((new Date() - start) / 86400000) + 1);
}
function currentPhaseIndex(day) {
  if (day === null) return 0;
  if (day <= 30) return 0;
  if (day <= 60) return 1;
  return 2;
}
function defaultChecklist() { return PHASES.map(function (p) { return p.tasks.map(function () { return false; }); }); }
function defaultWeeklyNotes() { var wn = {}; WEEKS.forEach(function (k) { wn[k] = { done: "", stuck: "" }; }); return wn; }

async function apiCall(action, payload) {
  var secret = localStorage.getItem(SECRET_KEY);
  var res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-app-secret": secret || "" },
    body: JSON.stringify(Object.assign({ action: action }, payload || {})),
  });
  var data = await res.json().catch(function () { return {}; });
  if (!res.ok) throw { status: res.status, data: data };
  return data;
}

var S = {
  screen: "loading",
  passwordError: "",
  activeTab: "roadmap",
  roadmap: null,
  activePhase: 0,
  openWeek: null,
  captures: [], capturesLoaded: false,
  briefings: [], briefingsLoaded: false,
  synthBusy: false,
  pendingActions: [], pendingLoaded: false, pendingBusy: null,
  busy: false,
};

function render() {
  var app = document.getElementById("app");
  app.innerHTML = "";
  if (S.screen === "loading") { app.appendChild(el("div", { class: "loading-dot", style: "padding-top:40vh;" }, ["Memuat\u2026"])); return; }
  if (S.screen === "password") { app.appendChild(buildPasswordScreen()); return; }
  app.appendChild(buildHeader());
  app.appendChild(buildTabBar());
  if (S.activeTab === "roadmap") app.appendChild(buildRoadmapTab());
  else if (S.activeTab === "jurnal") app.appendChild(buildJurnalTab());
  else app.appendChild(buildBriefingTab());
}

function buildPasswordScreen() {
  var input = el("input", { type: "password", class: "text-input", placeholder: "Password", style: "margin-bottom:10px;" }, []);
  var submit = async function () {
    if (!input.value || S.busy) return;
    S.busy = true; render();
    localStorage.setItem(SECRET_KEY, input.value);
    try {
      await apiCall("ping");
      S.screen = "main"; S.passwordError = "";
      S.busy = false;
      render();
      loadRoadmap();
      return;
    } catch (e) {
      S.passwordError = "Password salah.";
      localStorage.removeItem(SECRET_KEY);
    }
    S.busy = false; render();
  };
  input.addEventListener("keydown", function (e) { if (e.key === "Enter") submit(); });
  return el("div", { style: "min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;" }, [
    logoSvg(40),
    el("div", { class: "title", style: "margin:16px 0 24px;" }, ["Sistem Entropi"]),
    el("div", { style: "width:100%;max-width:280px;" }, [
      input,
      S.passwordError ? el("div", { class: "error-text" }, [S.passwordError]) : null,
      el("button", { class: "primary-btn", onclick: submit, style: "margin-top:6px;" }, [S.busy ? "Memeriksa\u2026" : "Masuk"])
    ])
  ]);
}

function buildHeader() {
  return el("div", { class: "row", style: "gap:12px;margin-bottom:20px;" }, [
    logoSvg(34),
    el("div", {}, [
      el("div", { class: "eyebrow" }, ["Sistem Entropi"]),
      el("div", { class: "title", style: "font-size:18px;" }, ["Dashboard"])
    ])
  ]);
}

function buildTabBar() {
  var wrap = el("div", { class: "tabbar" }, []);
  [["roadmap", "Roadmap"], ["jurnal", "Jurnal"], ["briefing", "Briefing"]].forEach(function (t) {
    wrap.appendChild(el("button", { class: "tabbtn" + (S.activeTab === t[0] ? " active" : ""), onclick: function () {
      S.activeTab = t[0];
      if (t[0] === "jurnal" && !S.capturesLoaded) loadCaptures();
      if (t[0] === "briefing") {
        if (!S.briefingsLoaded) loadBriefings();
        if (!S.pendingLoaded) loadPendingActions();
      }
      render();
    } }, [t[1]]));
  });
  return wrap;
}

/* ---------- ROADMAP ---------- */
async function loadRoadmap() {
  try {
    var res = await apiCall("get_roadmap");
    var st = res.state || {};
    S.roadmap = {
      startDate: st.start_date || null,
      checklist: (st.checklist && st.checklist.length) ? st.checklist : defaultChecklist(),
      weeklyNotes: (st.weekly_notes && Object.keys(st.weekly_notes).length) ? st.weekly_notes : defaultWeeklyNotes(),
      todayFocus: st.today_focus || null,
      aiNotes: st.ai_notes || [],
    };
    S.activePhase = currentPhaseIndex(dayNumber(S.roadmap.startDate));
  } catch (e) {
    S.roadmap = { startDate: null, checklist: defaultChecklist(), weeklyNotes: defaultWeeklyNotes() };
  }
  render();
}
async function saveRoadmap(mutate) {
  try {
    // Fetch-merge: ambil state server terbaru dulu supaya tidak menimpa
    // perubahan dari sintesis AI (race last-write-wins).
    var res = await apiCall("get_roadmap");
    var st = res.state || {};
    var fresh = {
      startDate: st.start_date || null,
      checklist: (st.checklist && st.checklist.length) ? st.checklist : defaultChecklist(),
      weeklyNotes: (st.weekly_notes && Object.keys(st.weekly_notes).length) ? st.weekly_notes : defaultWeeklyNotes(),
      todayFocus: st.today_focus || null,
      aiNotes: st.ai_notes || [],
    };
    if (typeof mutate === "function") mutate(fresh);
    S.roadmap = fresh;
    await apiCall("save_roadmap", {
      start_date: fresh.startDate, checklist: fresh.checklist, weekly_notes: fresh.weeklyNotes,
    });
  } catch (e) {}
}

function buildRoadmapTab() {
  if (!S.roadmap) { return el("div", { class: "loading-dot" }, ["Memuat roadmap\u2026"]); }
  var d = el("div", {}, []);
  if (S.roadmap.todayFocus) {
    d.appendChild(el("div", { class: "focus-banner" }, [
      el("div", { class: "focus-label" }, ["Fokus hari ini \u2014 dari sintesis"]),
      el("div", { class: "focus-text" }, [S.roadmap.todayFocus])
    ]));
  }
  d.appendChild(buildRoadmapHeader());
  if (!S.roadmap.startDate) d.appendChild(buildStartCard());
  else { d.appendChild(buildPhaseTabs()); d.appendChild(buildPhaseCard()); d.appendChild(buildWeeklyLog()); }
  return d;
}

function buildRoadmapHeader() {
  var r = S.roadmap;
  var day = dayNumber(r.startDate);
  var dayClamped = day === null ? 0 : Math.min(day, 90);
  var totalTasks = PHASES.reduce(function (s, p) { return s + p.tasks.length; }, 0);
  var doneTasks = r.checklist.reduce(function (s, arr) { return s + arr.filter(Boolean).length; }, 0);
  var dayFrac = dayClamped / 90;
  var R = 50, CIRC = 2 * Math.PI * R;
  var svgWrap = document.createElement("div");
  svgWrap.innerHTML =
    '<svg width="118" height="118" viewBox="0 0 118 118">' +
    '<circle cx="59" cy="59" r="' + R + '" fill="none" stroke="#232B36" stroke-width="7"/>' +
    '<circle cx="59" cy="59" r="' + R + '" fill="none" stroke="#C9A227" stroke-width="7" stroke-linecap="round" ' +
    'stroke-dasharray="' + (dayFrac * CIRC) + ' ' + CIRC + '" transform="rotate(-90 59 59)"/>' +
    '<text x="59" y="53" text-anchor="middle" font-size="24" font-weight="700" fill="#E6E9ED">' + (day === null ? "\u2014" : dayClamped) + '</text>' +
    '<text x="59" y="70" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8B95A1">/ 90 HARI</text>' +
    '</svg>';
  var s2 = el("div", { class: "stat-value" }, [doneTasks + " / " + totalTasks]);
  s2.appendChild(el("span", { class: "stat-sub" }, [Math.round((totalTasks ? doneTasks / totalTasks : 0) * 100) + "%"]));
  return el("div", { class: "row", style: "gap:20px;margin-bottom:20px;" }, [
    svgWrap.firstChild,
    el("div", { style: "flex:1;" }, [
      el("div", {}, [el("div", { class: "stat-label" }, ["Progres hari"]),
        el("div", { class: "stat-value" }, [day === null ? "belum mulai" : Math.round(dayFrac * 100) + "%"])]),
      el("div", { style: "margin-top:10px;" }, [el("div", { class: "stat-label" }, ["Checklist selesai"]), s2])
    ])
  ]);
}

function buildStartCard() {
  var dateInput = el("input", { type: "date", class: "date-input", value: todayISO() });
  var start = function (val) {
    S.roadmap.startDate = val;
    S.activePhase = currentPhaseIndex(dayNumber(val));
    render();
    saveRoadmap(function (fresh) { fresh.startDate = val; }).then(render);
  };
  return el("div", { class: "card" }, [
    el("div", { style: "font-size:15px;font-weight:600;margin-bottom:8px;" }, ["Belum ada titik mulai"]),
    el("div", { style: "font-size:13px;color:#8B95A1;line-height:1.6;margin-bottom:18px;" }, ["Tetapkan hari pertama roadmap."]),
    el("button", { class: "primary-btn", onclick: function () { start(todayISO()); }, style: "margin-bottom:10px;" }, ["Mulai hari ini"]),
    el("div", { class: "row", style: "gap:8px;" }, [dateInput,
      el("button", { class: "ghost-btn", onclick: function () { start(dateInput.value); } }, ["Pakai tanggal ini"])])
  ]);
}

function buildPhaseTabs() {
  var currentIdx = currentPhaseIndex(dayNumber(S.roadmap.startDate));
  var wrap = el("div", { class: "phase-tabs" }, []);
  PHASES.forEach(function (p, i) {
    var tab = el("button", { class: "phase-tab" + (S.activePhase === i ? " active" : ""), onclick: function () { S.activePhase = i; render(); } }, [
      el("div", { style: "font-weight:700;font-size:12px;" }, ["Fase " + (i + 1)]),
      el("div", { style: "color:#4A5560;margin-top:2px;" }, [p.range])
    ]);
    if (i === currentIdx) tab.appendChild(el("span", { class: "tab-dot" }, []));
    wrap.appendChild(tab);
  });
  return wrap;
}

function buildPhaseCard() {
  var phase = PHASES[S.activePhase];
  var checklist = S.roadmap.checklist[S.activePhase];
  var tasksWrap = el("div", {}, []);
  phase.tasks.forEach(function (t, ti) {
    var done = checklist[ti];
    var pi = S.activePhase;
    tasksWrap.appendChild(el("button", { class: "task", onclick: async function () {
      var newVal = !checklist[ti];
      checklist[ti] = newVal; render(); // optimistic
      await saveRoadmap(function (fresh) {
        if (fresh.checklist[pi]) fresh.checklist[pi][ti] = newVal;
      });
      render();
    } }, [
      el("span", { class: "checkbox" + (done ? " done" : "") }, done ? [iconCheck("#0B0F14")] : []),
      el("span", { class: "task-text" + (done ? " done" : "") }, [t])
    ]));
  });
  return el("div", { class: "card" }, [
    el("div", { style: "font-size:16px;font-weight:700;" }, [phase.name]),
    el("div", { style: "font-size:13px;color:#8B95A1;margin-top:6px;line-height:1.55;" }, [phase.goal]),
    el("div", { class: "divider" }, []),
    tasksWrap
  ]);
}

function buildWeeklyLog() {
  var wrap = el("div", { class: "card" }, [
    el("div", { class: "section-label", style: "margin-bottom:4px;" }, ["Catatan Mingguan"]),
    el("div", { style: "font-size:12px;color:#8B95A1;margin-bottom:14px;line-height:1.5;" }, ["Apa yang selesai, apa yang macet."])
  ]);
  WEEKS.forEach(function (wk) {
    var open = S.openWeek === wk;
    var note = S.roadmap.weeklyNotes[wk] || (S.roadmap.weeklyNotes[wk] = { done: "", stuck: "" });
    var hasContent = note.done || note.stuck;
    var head = el("button", { class: "week-head", onclick: function () { S.openWeek = open ? null : wk; render(); } }, [
      el("span", { style: "display:flex;align-items:center;gap:8px;" },
        hasContent ? ["Minggu " + wk, el("span", { style: "width:5px;height:5px;border-radius:99px;background:#C9A227;" }, [])] : ["Minggu " + wk])
    ]);
    head.appendChild(iconChevron(open, "#8B95A1"));
    var box = el("div", { class: "week" }, [head]);
    if (open) {
      var d1 = el("textarea", { class: "text-input", rows: "2" }, []); d1.value = note.done;
      d1.addEventListener("blur", function (e) {
        var v = e.target.value; note.done = v;
        saveRoadmap(function (fresh) {
          if (!fresh.weeklyNotes[wk]) fresh.weeklyNotes[wk] = { done: "", stuck: "" };
          fresh.weeklyNotes[wk].done = v;
        });
      });
      var d2 = el("textarea", { class: "text-input", rows: "2" }, []); d2.value = note.stuck;
      d2.addEventListener("blur", function (e) {
        var v = e.target.value; note.stuck = v;
        saveRoadmap(function (fresh) {
          if (!fresh.weeklyNotes[wk]) fresh.weeklyNotes[wk] = { done: "", stuck: "" };
          fresh.weeklyNotes[wk].stuck = v;
        });
      });
      box.appendChild(el("div", { class: "week-body" }, [
        el("div", {}, [el("label", { class: "field-label", style: "color:#5A8A6E;" }, ["Selesai"]), d1]),
        el("div", {}, [el("label", { class: "field-label", style: "color:#C97757;" }, ["Macet"]), d2])
      ]));
    }
    wrap.appendChild(box);
  });
  return wrap;
}

/* ---------- JURNAL ---------- */
async function loadCaptures() {
  try { S.captures = (await apiCall("list_captures", { limit: 150 })).captures || []; }
  catch (e) { S.captures = []; }
  S.capturesLoaded = true; render();
}
function fmtDay(iso) {
  return new Date(iso).toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
}

function buildJurnalTab() {
  var wrap = el("div", {}, [buildComposeCard()]);
  if (!S.capturesLoaded) { wrap.appendChild(el("div", { class: "loading-dot" }, ["Memuat catatan\u2026"])); return wrap; }
  if (!S.captures.length) {
    wrap.appendChild(el("div", { class: "card" }, [el("div", { class: "empty-note" }, ["Belum ada catatan.\nTap tombol \u201cCatat\u201d di homescreen, atau tulis langsung di atas."])]));
    return wrap;
  }
  var listCard = el("div", { class: "card" }, []);
  var lastDay = null;
  S.captures.forEach(function (c) {
    var day = c.created_at.slice(0, 10);
    if (day !== lastDay) { listCard.appendChild(el("div", { class: "day-header" }, [fmtDay(c.created_at)])); lastDay = day; }
    listCard.appendChild(buildCaptureItem(c));
  });
  wrap.appendChild(listCard);
  return wrap;
}

function buildCaptureItem(c) {
  var isImg = c.kind === "image";
  var isVoice = c.source === "shortcut_audio";
  var badgeClass = isImg ? "kind-image" : isVoice ? "kind-voice" : "kind-text";
  var badgeLabel = isImg ? "FOTO" : isVoice ? "SUARA" : "TEKS";
  var delBtn = el("button", { class: "del-btn", onclick: async function () {
    if (!window.confirm("Hapus catatan ini?")) return;
    try { await apiCall("delete_capture", { id: c.id }); S.capturesLoaded = false; loadCaptures(); } catch (e) {}
  } }, ["hapus"]);
  var meta = el("div", { class: "capture-meta" }, [
    el("span", { class: "kind-badge " + badgeClass }, [badgeLabel]),
    el("span", {}, [fmtTime(c.created_at)]),
    delBtn
  ]);
  var children = [meta, el("div", { class: "capture-content" }, [c.transcript])];
  if (isImg && c.image_path) {
    var holder = el("div", {}, []);
    var link = el("button", { class: "capture-img-link", onclick: async function () {
      link.textContent = "Memuat\u2026";
      try {
        var r = await apiCall("get_image_url", { image_path: c.image_path });
        holder.innerHTML = "";
        holder.appendChild(el("img", { class: "capture-img", src: r.url }, []));
      } catch (e) { link.textContent = "Gagal memuat gambar"; }
    } }, ["Lihat gambar"]);
    holder.appendChild(link);
    children.push(holder);
  }
  return el("div", { class: "capture-item" }, children);
}

function buildComposeCard() {
  var textarea = el("textarea", { class: "text-input", rows: "2", placeholder: "Tulis catatan\u2026" }, []);
  var fileInput = el("input", { type: "file", accept: "image/*", style: "display:none;" }, []);
  var fileLabel = el("span", {}, ["Tambah foto"]);
  var picked = null;
  fileInput.addEventListener("change", function (e) {
    picked = e.target.files[0] || null;
    fileLabel.textContent = picked ? picked.name : "Tambah foto";
  });
  var submitBtn = el("button", { class: "primary-btn", style: "width:auto;padding:9px 18px;", onclick: async function () {
    var text = textarea.value.trim();
    if (!text && !picked) return;
    submitBtn.disabled = true; submitBtn.textContent = "Menyimpan\u2026";
    try {
      if (picked) {
        var b64 = await fileToBase64(picked);
        await apiCall("add_image_capture", { image_base64: b64, mime_type: picked.type, caption: text });
      } else {
        await apiCall("add_text_capture", { text: text });
      }
      textarea.value = ""; picked = null; fileInput.value = ""; fileLabel.textContent = "Tambah foto";
      S.capturesLoaded = false; await loadCaptures();
    } catch (e) {}
    submitBtn.disabled = false; submitBtn.textContent = "Simpan";
  } }, ["Simpan"]);
  return el("div", { class: "card" }, [
    el("div", { class: "compose" }, [
      textarea,
      el("div", { class: "row between" }, [
        el("button", { class: "file-btn", onclick: function () { fileInput.click(); } }, [iconImg("#8B95A1", 14), fileLabel]),
        submitBtn
      ])
    ])
  ]);
}

function fileToBase64(file) {
  return new Promise(function (resolve, reject) {
    var r = new FileReader();
    r.onload = function () { resolve(r.result.split(",")[1]); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

/* ---------- BRIEFING ---------- */
async function loadBriefings() {
  try { S.briefings = (await apiCall("list_briefings", { limit: 30 })).briefings || []; }
  catch (e) { S.briefings = []; }
  S.briefingsLoaded = true; render();
}

async function loadPendingActions() {
  try { S.pendingActions = (await apiCall("list_pending_actions", { status: "pending" })).actions || []; }
  catch (e) { S.pendingActions = []; }
  S.pendingLoaded = true; render();
}

function describePendingAction(pa) {
  if (pa.action_type === "set_roadmap_start_date") {
    return "Usul menetapkan Hari 1 roadmap: " + (pa.payload && pa.payload.start_date) +
      (pa.payload && pa.payload.reason ? " \u2014 alasan: " + pa.payload.reason : "");
  }
  return pa.action_type + ": " + JSON.stringify(pa.payload);
}

function buildPendingActionsPanel() {
  if (!S.pendingLoaded) return el("div", { class: "loading-dot" }, ["Memuat usulan\u2026"]);
  if (!S.pendingActions.length) return null;
  var wrap = el("div", {}, [el("div", { class: "section-label" }, ["Menunggu Persetujuan"])]);
  S.pendingActions.forEach(function (pa) {
    var busy = S.pendingBusy === pa.id;
    var decide = async function (decision) {
      if (S.pendingBusy) return;
      S.pendingBusy = pa.id; render();
      try { await apiCall("resolve_pending_action", { id: pa.id, decision: decision }); }
      catch (e) {}
      S.pendingBusy = null; S.pendingLoaded = false;
      await loadPendingActions();
      if (decision === "approve") { S.roadmap = null; loadRoadmap(); }
    };
    wrap.appendChild(el("div", { class: "pending-card" }, [
      el("div", { class: "pending-type" }, [pa.action_type.replace(/_/g, " ")]),
      el("div", { class: "pending-body" }, [describePendingAction(pa)]),
      el("div", { class: "pending-actions-row" }, [
        el("button", { class: "approve-btn", onclick: function () { decide("approve"); } }, [busy ? "\u2026" : "Setujui"]),
        el("button", { class: "reject-btn", onclick: function () { decide("reject"); } }, [busy ? "\u2026" : "Tolak"])
      ])
    ]));
  });
  return wrap;
}

function buildAiNotesPanel() {
  var notes = (S.roadmap && S.roadmap.aiNotes) || [];
  if (!notes.length) return null;
  var card = el("div", { class: "card" }, [el("div", { class: "section-label", style: "margin-bottom:4px;" }, ["Catatan AI"])]);
  notes.slice().reverse().forEach(function (n) {
    card.appendChild(el("div", { class: "ai-note" }, [
      el("div", { class: "ai-note-date" }, [fmtDay(n.created_at) + " \u00b7 " + fmtTime(n.created_at)]),
      el("div", {}, [n.note])
    ]));
  });
  return card;
}

function buildBriefingTab() {
  var wrap = el("div", {}, []);
  var runBtn = el("button", { class: "primary-btn", onclick: async function () {
    if (S.synthBusy) return;
    S.synthBusy = true; render();
    try { await apiCall("run_synthesis"); } catch (e) {}
    S.briefingsLoaded = false; S.pendingLoaded = false;
    await Promise.all([loadBriefings(), loadPendingActions()]);
    S.roadmap = null; await loadRoadmap();
    S.synthBusy = false; render();
  } }, [S.synthBusy ? "Menyintesis\u2026 (bisa 30 detik)" : "Sintesis sekarang"]);

  wrap.appendChild(el("div", { class: "card" }, [
    el("div", { class: "section-label", style: "margin-bottom:6px;" }, ["Sintesis Malam"]),
    el("div", { style: "font-size:12.5px;color:#8B95A1;line-height:1.6;margin-bottom:14px;" },
      ["Berjalan otomatis tiap 03.00 WIB \u2014 membaca semua catatan 24 jam terakhir (teks, suara, dan isi visual foto), lalu mencari pola. Bisa langsung update checklist/fokus/catatan AI; perubahan struktural (mis. tanggal mulai roadmap) menunggu persetujuanmu di bawah. Tombol di bawah untuk memaksa jalan sekarang."]),
    runBtn
  ]));

  var pendingPanel = buildPendingActionsPanel();
  if (pendingPanel) wrap.appendChild(pendingPanel);

  var aiNotesPanel = buildAiNotesPanel();
  if (aiNotesPanel) wrap.appendChild(aiNotesPanel);

  if (!S.briefingsLoaded) { wrap.appendChild(el("div", { class: "loading-dot" }, ["Memuat briefing\u2026"])); return wrap; }
  if (!S.briefings.length) {
    wrap.appendChild(el("div", { class: "card" }, [el("div", { class: "empty-note" }, ["Belum ada briefing.\nIsi jurnal dulu hari ini \u2014 sintesis hanya sebaik input yang kamu beri."])]));
    return wrap;
  }
  var card = el("div", { class: "card" }, []);
  S.briefings.forEach(function (b) {
    card.appendChild(el("div", { class: "brief-card" }, [
      el("div", { class: "brief-date" }, [fmtDay(b.created_at) + " \u00b7 " + fmtTime(b.created_at)]),
      el("div", { class: "brief-body" }, [b.content]),
      el("div", { class: "brief-model" }, [b.model || ""])
    ]));
  });
  wrap.appendChild(card);
  return wrap;
}

/* ---------- init ---------- */
(async function init() {
  var stored = localStorage.getItem(SECRET_KEY);
  if (!stored) { S.screen = "password"; render(); return; }
  try {
    var res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-app-secret": stored },
      body: JSON.stringify({ action: "ping" }),
    });
    if (!res.ok) throw new Error("invalid");
    S.screen = "main"; render();
    loadRoadmap();
  } catch (e) {
    localStorage.removeItem(SECRET_KEY);
    S.screen = "password"; render();
  }
})();
</script>
