<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI-OS Console</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    padding: 24px 16px 80px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #fbbf24; margin: 0 0 20px; }
  input, textarea {
    width: 100%;
    background: #1e293b;
    border: 1px solid #334155;
    color: #e2e8f0;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
  button {
    background: #fbbf24;
    color: #0f172a;
    border: none;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: transparent; border: 1px solid #475569; color: #cbd5e1; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .status { font-size: 11px; padding: 4px 8px; border: 1px solid #475569; border-radius: 4px; text-transform: uppercase; }
  #errorBox { background: #450a0a; border: 1px solid #b91c1c; color: #fca5a5; padding: 10px 14px; border-radius: 6px; font-size: 12px; margin-bottom: 16px; display: none; white-space: pre-wrap; }
  #debugBox { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 10px 14px; border-radius: 6px; font-size: 11px; margin-bottom: 16px; display: none; white-space: pre-wrap; }
  section { margin-bottom: 28px; }
  section h2 { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #64748b; margin: 0 0 10px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
  .muted { color: #64748b; font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>&#128225; AI-OS Console (standalone)</h1>

  <div id="loginView">
    <p class="muted">Masukkan APP_SECRET buat sesi ini. Nggak disimpan permanen.</p>
    <div class="row">
      <input type="password" id="secretInput" placeholder="APP_SECRET" />
      <button onclick="connect()">Hubungkan</button>
    </div>
    <div id="errorBox"></div>
    <div id="debugBox"></div>
  </div>

  <div id="mainView" style="display:none;">
    <div id="errorBox2"></div>

    <section>
      <h2>Catatan baru</h2>
      <div class="row">
        <input id="composeInput" placeholder="Tulis sesuatu..." />
        <button onclick="submitEntry()">Kirim</button>
      </div>
    </section>

    <section>
      <h2>Menunggu keputusan</h2>
      <div id="pendingList"><p class="muted">Memuat...</p></div>
    </section>

    <section>
      <h2>Log entries</h2>
      <div id="entriesList"><p class="muted">Memuat...</p></div>
    </section>

    <button class="secondary" onclick="refresh()">&#8635; Refresh</button>
  </div>
</div>

<script>
const BASE_URL = "https://ppomgoflwpsyatmaynne.supabase.co/functions/v1";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwb21nb2Zsd3BzeWF0bWF5bm5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NzIxMzksImV4cCI6MjEwMDA0ODEzOX0.H2fO03O2-_QrjFbVaTcEN2KWHJ79I_sMbmKjdZ1Itsg";
let SECRET = "";

function showError(msg) {
  const box = document.getElementById("errorBox");
  const box2 = document.getElementById("errorBox2");
  [box, box2].forEach(b => { if (b) { b.style.display = "block"; b.textContent = msg; } });
}
function clearError() {
  const box = document.getElementById("errorBox");
  const box2 = document.getElementById("errorBox2");
  [box, box2].forEach(b => { if (b) { b.style.display = "none"; b.textContent = ""; } });
}
function debug(msg) {
  const box = document.getElementById("debugBox");
  box.style.display = "block";
  box.textContent = msg;
}

async function call(fn, payload) {
  const res = await fetch(`${BASE_URL}/${fn}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${ANON_KEY}`,
      "x-app-secret": SECRET,
    },
    body: JSON.stringify(payload || {}),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || (fn + " gagal (" + res.status + ")"));
  return data;
}

async function connect() {
  SECRET = document.getElementById("secretInput").value;
  clearError();
  debug("Menghubungi " + BASE_URL + "/list-entries ...");
  try {
    await call("list-entries", { limit: 1 });
    document.getElementById("loginView").style.display = "none";
    document.getElementById("mainView").style.display = "block";
    refresh();
  } catch (err) {
    showError("Gagal connect: " + (err.message || err) + "\\n\\nKalau pesannya 'Failed to fetch', berarti koneksi ke Supabase-nya sendiri yang gagal (jaringan/CORS/domain). Kalau pesannya 'Unauthorized', berarti APP_SECRET salah.");
    debug("Error detail: " + (err.stack || err));
  }
}

async function refresh() {
  clearError();
  try {
    const e = await call("list-entries", { limit: 20 });
    const p = await call("list-pending-edits", {});
    renderEntries(e.entries || []);
    renderPending(p.pending_edits || []);
  } catch (err) {
    showError(String(err.message || err));
  }
}

async function submitEntry() {
  const text = document.getElementById("composeInput").value.trim();
  if (!text) return;
  try {
    await call("ingest", { type: "text", content: text, metadata: { source: "standalone_console" } });
    document.getElementById("composeInput").value = "";
    refresh();
  } catch (err) {
    showError(String(err.message || err));
  }
}

async function classifyEntry(id) {
  try {
    await call("classify", { entry_id: id });
    refresh();
  } catch (err) {
    showError(String(err.message || err));
  }
}

async function decide(id, decision) {
  try {
    let feedback;
    if (decision === "refine") {
      feedback = prompt("Feedback buat revisi:");
      if (!feedback) return;
    }
    await call("review-edit", { pending_edit_id: id, decision, revision_feedback: feedback });
    refresh();
  } catch (err) {
    showError(String(err.message || err));
  }
}

async function triggerRevision(id) {
  try {
    await call("revise-edit", { pending_edit_id: id });
    refresh();
  } catch (err) {
    showError(String(err.message || err));
  }
}

function renderEntries(entries) {
  const el = document.getElementById("entriesList");
  if (entries.length === 0) { el.innerHTML = '<p class="muted">Belum ada entry.</p>'; return; }
  el.innerHTML = entries.map(e => `
    <div class="card">
      <div style="display:flex; justify-content:space-between; gap:10px;">
        <div style="flex:1; min-width:0;">
          <div style="font-size:13px;">${escapeHtml(e.content || ("(" + e.type + ")"))}</div>
          <div class="muted" style="margin-top:4px;">${new Date(e.created_at).toLocaleString("id-ID")}${e.classifications && e.classifications[0] ? " &middot; " + escapeHtml(e.classifications[0].label) : ""}</div>
        </div>
        <div style="display:flex; align-items:start; gap:6px;">
          ${e.status === "new" ? `<button class="secondary" onclick="classifyEntry('${e.id}')">Klasifikasi</button>` : ""}
          <span class="status">${e.status}</span>
        </div>
      </div>
    </div>
  `).join("");
}

function renderPending(items) {
  const el = document.getElementById("pendingList");
  if (items.length === 0) { el.innerHTML = '<p class="muted">Tidak ada PR menunggu.</p>'; return; }
  el.innerHTML = items.map(pe => `
    <div class="card">
      <div style="display:flex; justify-content:space-between; gap:10px; margin-bottom:8px;">
        <div style="font-size:13px;">${escapeHtml(pe.diff_summary)}</div>
        <span class="status">${pe.status}</span>
      </div>
      ${pe.pr_url ? `<div class="muted" style="margin-bottom:8px;"><a href="${pe.pr_url}" target="_blank" style="color:#fbbf24;">Lihat diff &#8599;</a></div>` : ""}
      ${pe.status === "needs_revision"
        ? `<button onclick="triggerRevision('${pe.id}')" style="width:100%;">Jalankan revisi AI</button>`
        : `<div class="row">
             <button onclick="decide('${pe.id}','approve')" style="flex:1;">Approve</button>
             <button onclick="decide('${pe.id}','decline')" class="secondary" style="flex:1;">Decline</button>
             <button onclick="decide('${pe.id}','refine')" class="secondary" style="flex:1;">Refine</button>
           </div>`
      }
    </div>
  `).join("");
}

function escapeHtml(s) {
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}
</script>
</body>
</html>
