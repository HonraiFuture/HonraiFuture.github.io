<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rumah">
<meta name="theme-color" content="#F7F4EF">
<title>Rumah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F7F4EF;--card:#FFFFFF;--ink:#1C1B19;--muted:#938C80;--faint:#B8B1A4;--line:#E9E3D9;--line2:#F1ECE3;--income:#3F7D58;--outcome:#C0613B;--accent:var(--outcome)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--paper);color:var(--ink);font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100dvh;padding:max(22px,env(safe-area-inset-top)) 18px max(30px,env(safe-area-inset-bottom));background-image:radial-gradient(120% 60% at 50% -10%, #FBF9F5 0%, var(--paper) 60%)}
.wrap{max-width:440px;margin:0 auto}
.brand{display:flex;align-items:baseline;gap:10px;padding:4px 4px 16px}
.brand h1{font-family:'Fraunces',serif;font-weight:500;font-size:30px;letter-spacing:-.01em;line-height:1}
.brand .kanji{font-family:'Fraunces',serif;color:var(--muted);font-size:16px;opacity:.7}
.brand .date{margin-left:auto;font-size:12.5px;color:var(--muted);font-weight:500;letter-spacing:.02em}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--line2);border-radius:13px;padding:4px;margin-bottom:18px}
.tabs button{border:0;background:transparent;font:inherit;font-weight:600;font-size:14px;color:var(--muted);padding:11px;border-radius:9px;cursor:pointer;transition:.18s}
.tabs button.on{background:var(--card);color:var(--ink);box-shadow:0 2px 7px -3px rgba(40,35,25,.22)}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px 20px 24px;box-shadow:0 1px 0 #fff inset,0 18px 40px -28px rgba(40,35,25,.28),0 2px 8px -4px rgba(40,35,25,.08)}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--line2);border-radius:13px;padding:4px;margin-bottom:18px}
.seg button{border:0;background:transparent;font:inherit;font-weight:600;font-size:14px;color:var(--muted);padding:11px 2px;border-radius:9px;cursor:pointer;transition:.2s}
.seg button.on{background:var(--accent);color:#fff;box-shadow:0 4px 12px -4px var(--accent)}
.amt{text-align:center;padding:6px 0 6px}
.amt .lab{font-size:11.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:600;margin-bottom:8px}
.amt .row{display:flex;align-items:center;justify-content:center;gap:6px}
.amt .rp{font-family:'JetBrains Mono',monospace;font-size:22px;color:var(--muted);font-weight:500}
.amt input{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:42px;border:0;outline:0;background:transparent;color:var(--ink);text-align:center;width:100%;max-width:280px;letter-spacing:-.02em}
.amt input::placeholder{color:#D8D1C5}
.pill{display:flex;justify-content:center;margin:2px 0 20px}
.pill span{font-size:12px;font-weight:600;color:var(--muted);background:var(--line2);border-radius:999px;padding:6px 13px;letter-spacing:.01em}
.pill .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:7px;vertical-align:middle;transition:.2s}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin:0 2px 7px}
.fld input[type=text],.fld input[type=date]{width:100%;font:inherit;font-size:16px;font-weight:500;color:var(--ink);background:#FCFBF8;border:1px solid var(--line);border-radius:13px;padding:13px 14px;outline:0;transition:.18s;-webkit-appearance:none;appearance:none}
.fld input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 14%,transparent)}
.go{width:100%;margin-top:8px;border:0;background:var(--accent);color:#fff;font:inherit;font-weight:700;font-size:16px;padding:16px;border-radius:15px;cursor:pointer;transition:.18s;box-shadow:0 10px 24px -10px var(--accent)}
.go:active{transform:translateY(1px) scale(.995)}
.go:disabled{opacity:.55}
.dash{display:flex;flex-direction:column;gap:14px}
.hero{padding:22px 22px 20px}
.hero .lab{font-size:11.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:600}
.hero .big{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:34px;letter-spacing:-.02em;margin:7px 0 2px;line-height:1.05}
.hero .big .rp{font-size:18px;color:var(--muted);margin-right:3px}
.hero .stats{display:flex;gap:22px;margin-top:16px;padding-top:15px;border-top:1px solid var(--line2)}
.hero .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);font-weight:600}
.hero .stat .v{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;margin-top:3px}
.hero .stat .v.in{color:var(--income)}.hero .stat .v.out{color:var(--outcome)}
.ttl{font-family:'Fraunces',serif;font-weight:500;font-size:17px;margin-bottom:14px;display:flex;align-items:baseline;gap:8px}
.ttl .sub{font-family:'Hanken Grotesk';font-size:11.5px;color:var(--faint);font-weight:500;margin-left:auto;letter-spacing:.02em}
.chartwrap{width:100%;height:120px;position:relative}
.chartwrap svg{width:100%;height:100%;display:block;overflow:visible}
.chartwrap .empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--faint);font-size:13px;text-align:center;padding:0 10px}
.tx{display:flex;align-items:center;padding:11px 0;border-top:1px solid var(--line2)}
.tx:first-of-type{border-top:0}
.tx .nm{font-weight:600;font-size:14.5px}
.tx .mt{font-size:11.5px;color:var(--faint);margin-top:2px}
.tx .am{margin-left:auto;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14.5px;white-space:nowrap}
.tx .am.in{color:var(--income)}.tx .am.out{color:var(--outcome)}
.refresh{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:2px;color:var(--faint);font-size:12px;font-weight:500;cursor:pointer;padding:10px}
.refresh.spin{opacity:.45}
.skel{color:var(--faint);font-size:13px;text-align:center;padding:26px 0}
.toast{position:fixed;left:18px;right:18px;bottom:max(20px,env(safe-area-inset-bottom));max-width:404px;margin:0 auto;background:var(--ink);color:#fff;border-radius:14px;padding:14px 16px;font-size:14.5px;font-weight:500;display:flex;align-items:center;gap:10px;opacity:0;transform:translateY(16px);transition:.28s;pointer-events:none;box-shadow:0 16px 36px -12px rgba(0,0,0,.4);z-index:30}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#23492F}.toast.err{background:#7A2E1E}
.toast .dot{width:8px;height:8px;border-radius:50%;background:#fff;flex:none}
#lock{position:fixed;inset:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;z-index:20}
#lock h1{font-family:'Fraunces',serif;font-weight:500;font-size:38px;margin-bottom:6px}
#lock .kj{font-family:'Fraunces',serif;color:var(--muted);font-size:18px;margin-bottom:10px}
#lock p{color:var(--muted);font-size:14px;margin-bottom:26px}
#lock .lc{width:100%;max-width:340px}
#lock input{width:100%;font:inherit;font-size:16px;text-align:center;background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px;outline:0;margin-bottom:12px}
#lock input:focus{border-color:var(--ink)}
#lock button{width:100%;border:0;background:var(--ink);color:#fff;font:inherit;font-weight:700;font-size:15px;padding:15px;border-radius:13px;cursor:pointer}
.hide{display:none!important}
</style>
</head>
<body>
<div id="lock">
  <h1>Rumah</h1>
  <div class="kj">家</div>
  <p>Masukkan kunci akses</p>
  <div class="lc">
    <input id="keyInput" type="password" placeholder="tempel kunci di sini" autocomplete="off">
    <button id="unlockBtn">Buka</button>
  </div>
</div>

<div id="app" class="hide">
<div class="wrap">
  <div class="brand"><h1>Rumah</h1><span class="kanji">家</span><span class="date" id="dateLbl"></span></div>
  <div class="tabs">
    <button data-tab="catat" class="on">Catat</button>
    <button data-tab="ringkas">Ringkas</button>
  </div>

  <div id="view-catat">
    <div class="card">
      <div class="seg" id="seg">
        <button data-mode="out" class="on">Keluar</button>
        <button data-mode="in">Masuk</button>
      </div>
      <div class="amt">
        <div class="lab">Nominal</div>
        <div class="row"><span class="rp">Rp</span><input id="amt" inputmode="numeric" placeholder="0"></div>
      </div>
      <div class="pill"><span><span class="dot"></span>Dompet Rumah · Prive</span></div>
      <div class="fld"><label id="nameLbl">Untuk apa</label><input id="name" type="text" placeholder="mis. belanja sayur, jajan anak"></div>
      <div class="fld"><label>Tanggal</label><input id="date" type="date"></div>
      <div class="fld"><label>Catatan (opsional)</label><input id="note" type="text" placeholder="—"></div>
      <button class="go" id="go">Catat</button>
    </div>
  </div>

  <div id="view-ringkas" class="hide">
    <div class="dash">
      <div class="card hero">
        <div class="lab">Sisa di Dompet Rumah</div>
        <div class="big" id="d-balance"><span class="rp">Rp</span>—</div>
        <div class="stats">
          <div class="stat"><div class="k">Masuk bln ini</div><div class="v in" id="d-in">—</div></div>
          <div class="stat"><div class="k">Keluar bln ini</div><div class="v out" id="d-out">—</div></div>
        </div>
      </div>
      <div class="card">
        <div class="ttl">Saldo Dompet<span class="sub" id="d-curvesub"></span></div>
        <div class="chartwrap" id="chart"><div class="empty">memuat…</div></div>
      </div>
      <div class="card">
        <div class="ttl">Transaksi Terbaru</div>
        <div id="d-recent"><div class="skel">memuat…</div></div>
      </div>
      <div class="refresh" id="d-refresh"><span id="d-updated">↻ ketuk untuk segarkan</span></div>
    </div>
  </div>

</div>
</div>
<div class="toast" id="toast"><span class="dot"></span><span id="toastMsg"></span></div>

<script>
var TK='honrai_token';
var BASE='https://fafkgfddyrimfdlpqwqs.supabase.co/functions/v1';
var API=BASE+'/add-transaction';
var PRIVE=BASE+'/prive-data';
var MON=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
var mode='out', raw=0, tab='catat', loading=false;
var $=function(id){return document.getElementById(id)};

function fmt(n){return Number(n).toLocaleString('id-ID')}
function shortRp(n){var a=Math.abs(n);if(a>=1e9)return (n/1e9).toFixed(1).replace('.0','')+'M';if(a>=1e6)return (n/1e6).toFixed(1).replace('.0','')+'jt';if(a>=1e3)return Math.round(n/1e3)+'rb';return ''+n}
function dlabel(s){var p=s.split('-');return parseInt(p[2],10)+' '+MON[parseInt(p[1],10)-1]}
function setDate(){var d=new Date();var m=String(d.getMonth()+1).padStart(2,'0');var day=String(d.getDate()).padStart(2,'0');$('date').value=d.getFullYear()+'-'+m+'-'+day;$('dateLbl').textContent=day+' '+MON[d.getMonth()]+' '+d.getFullYear()}

function setMode(m){
 mode=m;var b=$('seg').children;for(var i=0;i<b.length;i++){b[i].className=b[i].getAttribute('data-mode')===m?'on':''}
 var col=m==='in'?'var(--income)':'var(--outcome)';
 document.documentElement.style.setProperty('--accent',col);
 $('nameLbl').textContent=m==='in'?'Dari apa':'Untuk apa';
 $('name').placeholder=m==='in'?'mis. kembalian, hadiah, jualan':'mis. belanja sayur, jajan anak';
}

function toast(msg,kind){var t=$('toast');$('toastMsg').textContent=msg;t.className='toast show '+(kind||'');setTimeout(function(){t.className='toast '+(kind||'')},2600)}
function unlock(){var v=$('keyInput').value.trim();if(!v)return;localStorage.setItem(TK,v);boot()}
function boot(){var t=localStorage.getItem(TK);if(t){$('lock').classList.add('hide');$('app').classList.remove('hide');loadDash(true)}else{$('lock').classList.remove('hide');$('app').classList.add('hide')}}

function submit(){
 var token=localStorage.getItem(TK);
 if(raw<=0){toast('Nominal harus diisi','err');return}
 var name=$('name').value.trim();
 if(!name){toast(mode==='in'?'Isi dulu dari apa':'Isi dulu untuk apa','err');return}
 var payload;
 if(mode==='out'){
   payload={name:name,amount:raw,category:'outcome',from_code:'PRIVE',to_code:'EXTERNAL',segment:'personal',note:$('note').value.trim(),occurred_at:$('date').value};
 } else {
   payload={name:name,amount:raw,category:'income',from_code:'EXTERNAL',to_code:'PRIVE',segment:'personal',note:$('note').value.trim(),occurred_at:$('date').value};
 }
 var go=$('go');var lbl=go.textContent;go.disabled=true;go.textContent='Menyimpan…';
 fetch(API,{method:'POST',headers:{'Content-Type':'application/json','x-app-token':token},body:JSON.stringify(payload)})
  .then(function(r){return r.json().then(function(j){return{s:r.status,j:j}})})
  .then(function(res){go.disabled=false;go.textContent=lbl;
    if(res.s===401){localStorage.removeItem(TK);boot();toast('Kunci salah, masukkan ulang','err');return}
    if(res.s>=200&&res.s<300&&res.j&&res.j.ok){
      toast((mode==='in'?'Masuk':'Keluar')+' · '+payload.name+' · Rp'+fmt(raw),'ok');
      raw=0;$('amt').value='';$('name').value='';$('note').value='';
      loadDash(true);
    } else {toast((res.j&&res.j.error)?res.j.error:'Gagal menyimpan','err')}})
  .catch(function(){go.disabled=false;go.textContent=lbl;toast('Jaringan bermasalah','err')})}

function loadDash(force){
 var token=localStorage.getItem(TK);if(!token)return;
 if(loading&&!force)return;loading=true;
 $('d-refresh').classList.add('spin');
 fetch(PRIVE,{method:'POST',headers:{'Content-Type':'application/json','x-app-token':token},body:'{}'})
  .then(function(r){return r.json().then(function(j){return{s:r.status,j:j}})})
  .then(function(res){loading=false;$('d-refresh').classList.remove('spin');
    if(res.s===401){localStorage.removeItem(TK);boot();return}
    if(res.s>=200&&res.s<300)renderDash(res.j)})
  .catch(function(){loading=false;$('d-refresh').classList.remove('spin')})}

function renderDash(d){
 $('d-balance').innerHTML='<span class="rp">Rp</span>'+fmt(d.balance||0);
 $('d-in').textContent='Rp'+fmt(d.month_in||0);
 $('d-out').textContent='Rp'+fmt(d.month_out||0);
 var rh='';
 (d.recent||[]).forEach(function(t){
   var isIn=t.dir==='in';var cls=isIn?'in':'out';var sign=isIn?'+':'−';
   rh+='<div class="tx"><div><div class="nm">'+t.name+'</div><div class="mt">'+dlabel(t.date)+'</div></div><div class="am '+cls+'">'+sign+'Rp'+fmt(t.amount)+'</div></div>';
 });
 $('d-recent').innerHTML=rh||'<div class="skel">Belum ada transaksi</div>';
 drawChart(d.curve||[]);
 var now=new Date();$('d-updated').textContent='↻ diperbarui '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
}

function drawChart(series){
 var el=$('chart');
 if(!series.length){el.innerHTML='<div class="empty">Belum ada data</div>';$('d-curvesub').textContent='';return}
 if(series.length===1){
   el.innerHTML='<div class="empty">Rp'+fmt(series[0].t)+'<br>kurva tumbuh seiring hari</div>';
   $('d-curvesub').textContent=dlabel(series[0].d);return;
 }
 var W=100,H=40,pad=3,n=series.length;
 var vals=series.map(function(p){return p.t});
 var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals);
 if(min===max){min=min*0.999;max=max*1.001+1}
 var pts=series.map(function(p,i){
   var x=pad+(i/(n-1))*(W-2*pad);
   var y=H-pad-((p.t-min)/(max-min))*(H-2*pad);
   return [x,y];
 });
 var line=pts.map(function(p,i){return (i?'L':'M')+p[0].toFixed(2)+' '+p[1].toFixed(2)}).join(' ');
 var area=line+' L'+pts[n-1][0].toFixed(2)+' '+H+' L'+pts[0][0].toFixed(2)+' '+H+' Z';
 var last=pts[n-1], delta=vals[n-1]-vals[0];
 $('d-curvesub').textContent=(delta>=0?'+':'−')+'Rp'+shortRp(Math.abs(delta))+' · '+n+' hari';
 el.innerHTML='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'
  +'<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3F7D58" stop-opacity="0.20"/><stop offset="1" stop-color="#3F7D58" stop-opacity="0"/></linearGradient></defs>'
  +'<path d="'+area+'" fill="url(#g)"/>'
  +'<path d="'+line+'" fill="none" stroke="#3F7D58" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>'
  +'<circle cx="'+last[0].toFixed(2)+'" cy="'+last[1].toFixed(2)+'" r="2.2" fill="#3F7D58"/></svg>';
}

function switchTab(t){
 tab=t;
 var b=document.querySelectorAll('.tabs button');for(var i=0;i<b.length;i++){b[i].className=b[i].getAttribute('data-tab')===t?'on':''}
 $('view-catat').classList.toggle('hide',t!=='catat');
 $('view-ringkas').classList.toggle('hide',t!=='ringkas');
 if(t==='ringkas')loadDash(true);
}

setDate();
$('seg').addEventListener('click',function(e){var m=e.target.getAttribute('data-mode');if(m)setMode(m)});
$('amt').addEventListener('input',function(e){var d=e.target.value.replace(/[^0-9]/g,'');raw=d?parseInt(d,10):0;e.target.value=raw?fmt(raw):''});
$('go').addEventListener('click',submit);
$('unlockBtn').addEventListener('click',unlock);
$('keyInput').addEventListener('keydown',function(e){if(e.key==='Enter')unlock()});
document.querySelector('.tabs').addEventListener('click',function(e){var t=e.target.getAttribute('data-tab');if(t)switchTab(t)});
$('d-refresh').addEventListener('click',function(){loadDash(true)});
document.addEventListener('visibilitychange',function(){if(!document.hidden&&tab==='ringkas')loadDash(true)});
setInterval(function(){if(tab==='ringkas'&&!document.hidden)loadDash(false)},20000);
boot();
</script>
</body>
</html>
